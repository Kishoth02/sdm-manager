    async function handleFileUpload(e) {
      const file = e.target.files[0]; if (!file) return; e.target.value = '';
      const fi = { file, name: file.name, size: file.size, status: 'uploading', context: null };
      pendingFiles.push(fi); renderFileChips();
      try {
        const fd = new FormData(); fd.append('file', file);
        const r = await fetch(`${BACKEND}/api/files/upload`, { method: 'POST', body: fd });
        if (r.ok) {
          const data = await r.json(); fi.status = 'uploaded'; fi.context = buildFileContext(data); fi.fileObj = file;
          const session = getActiveSession();
          if (session) {
            session.fileContext = fi.context;
            if (!session.uploadedFiles) session.uploadedFiles = [];
            const already = session.uploadedFiles.find(f => f.name === (data.filename || file.name));
            if (!already) session.uploadedFiles.push({ name: data.filename || file.name, count: data.count || 0 });
            saveHistory();
          }
          renderFileChips();
          try {
            const jsonName = file.name.replace(/\.[^/.]+$/, '') + '.json';
            await fetch(`${BACKEND}/api/files/switch/${encodeURIComponent(jsonName)}`, { method: 'POST' });
          } catch { }
          const allFiles = await getAllSessionFiles();
          if (allFiles.length > 1) {
            activeWorkingFile = null;
            localStorage.removeItem('activeWorkingFile');
            const session2 = getActiveSession();
            if (session2) { session2.activeWorkingFile = null; saveHistory(); }
            addMessage('bot', '', `<div style="color:var(--easy);font-weight:600">✅ ${file.name} uploaded successfully!<br>
    <span style="color:var(--text3);font-size:11px">💡 Ask a question and I'll ask which file to use.</span>
  </div>`);
          } else if (!activeWorkingFile) {
            activeWorkingFile = data.filename || file.name.replace(/\.[^/.]+$/, '') + '.json';
            await fetch(`${BACKEND}/api/files/switch/${encodeURIComponent(activeWorkingFile)}`, { method: 'POST' });
            const sess = getActiveSession();
            if (sess) { sess.activeWorkingFile = activeWorkingFile; saveHistory(); }
            localStorage.setItem('activeWorkingFile', activeWorkingFile);

            // Show automatic summary
            try {
              await new Promise(r => setTimeout(r, 500));
              const summaryFile = data.filename || file.name.replace(/\.[^/.]+$/, '') + '.json';
              const sr = await fetch(`${BACKEND}/api/mcqs?filename=${encodeURIComponent(summaryFile)}&_t=${Date.now()}`);
              const sd = await sr.json();
              const allQs = Array.isArray(sd) ? sd : (sd.mcqs || sd.questions || []);
              console.log('DEBUG allQs length:', allQs.length, 'sample:', allQs[0]);
              const groups = {};
              allQs.forEach(q => {
                const g = q.topic || 'General';
                if (!g || g.trim().toLowerCase() === 'nan') return;
                if (!groups[g]) groups[g] = 0;
                groups[g]++;
              });
              const groupRows = Object.entries(groups).map(([name, count]) =>
                `<div style="padding:7px 12px;background:var(--surface2);border-radius:6px;margin:3px 0;display:flex;justify-content:space-between;align-items:center;font-size:12px">
      <span>📁 <b>${name}</b></span>
      <span style="color:var(--text3)">${count} questions</span>
    </div>`
              ).join('');
              const actionBtns = `
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:12px">
      <button class="sq-btn" onclick="suggest('show all questions')">📋 Show Questions</button>
      <button class="sq-btn" onclick="suggest('add a question')">➕ Add Question</button>
      <button class="sq-btn" onclick="suggest('edit a question')">✏️ Edit Question</button>
      <button class="sq-btn" onclick="suggest('delete a question')">❌ Delete Question</button>
    </div>`;
              addMessage('bot', '', `<div>
    <div style="color:var(--easy);font-weight:600;margin-bottom:10px">✅ ${file.name} uploaded successfully!</div>
    <div style="font-weight:600;font-size:13px;margin-bottom:8px">📂 Your file has ${Object.keys(groups).length} group${Object.keys(groups).length > 1 ? 's' : ''}:</div>
    ${groupRows}
    <div style="font-size:12px;color:var(--text2);margin-top:10px">What would you like to do?</div>
    ${actionBtns}
  </div>`);
            } catch {
              addMessage('bot', '', `<div style="color:var(--easy);font-weight:600">✅ ${file.name} uploaded!<br>
    <span style="color:var(--text3);font-size:11px">Type "show all questions" to see them.</span>
  </div>`);
            }
          } else {
            addMessage('bot', '', `<div style="color:var(--easy);font-weight:600">✅ ${file.name} uploaded successfully!</div>`);
          }
        } else {
          const err = await r.json(); fi.status = 'error'; renderFileChips();
          addMessage('bot', '', `<div style="color:var(--hard)">⚠️ Upload failed: ${err.detail || 'Unknown error'}</div>`);
        }
      } catch { fi.status = 'error'; renderFileChips(); addMessage('bot', '', `<div style="color:var(--hard)">⚠️ Could not connect to backend.</div>`); }
    }

    async function handleFolderUpload(e) {
      const files = Array.from(e.target.files); e.target.value = '';
      for (const file of files.slice(0, 5)) await handleFileUpload({ target: { files: [file], value: '' } });
    }

    function buildFileContext(data) {
      if (data.count !== undefined && !data.questions && !data.mcqs) return `${data.filename || 'file'} — ${data.count} questions uploaded successfully`;
      const arr = data.questions || data.mcqs || (Array.isArray(data) ? data : []);
      return buildFileContextFromArray(data.filename || 'file', arr);
    }

    function buildFileContextFromArray(filename, arr) {
      if (!arr || !arr.length) return `${filename}: 0 questions`;
      return `${filename} — ${arr.length} questions`;
    }

    function renderFileChips() {
      const container = document.getElementById('file-chips'); container.innerHTML = '';
      pendingFiles.forEach((f, i) => {
        const ext = f.name.split('.').pop().toLowerCase();
        const icon = ext === 'json' ? '🟣' : (ext === 'csv' || ext === 'xlsx' || ext === 'xls') ? '🟢' : ext === 'txt' ? '📝' : '📄';
        const st = f.status === 'uploading' ? `<span class="file-chip-status" style="color:var(--medium)">uploading…</span>` : f.status === 'uploaded' ? `<span class="file-chip-status">✓ uploaded</span>` : `<span class="file-chip-status" style="color:var(--hard)">✗ error</span>`;
        const chip = document.createElement('div'); chip.className = 'file-chip';
        chip.innerHTML = `<span class="file-chip-icon">${icon}</span><span class="file-chip-name">${f.name}</span><span class="file-chip-size">${(f.size / 1024).toFixed(1)}KB</span>${st}<button class="file-chip-x" onclick="removeChip(${i})">×</button>`;
        container.appendChild(chip);
      });
    }

    function removeChip(i) { pendingFiles.splice(i, 1); renderFileChips(); }
    async function selectWorkingFile(filename) {
      activeWorkingFile = filename;
      localStorage.setItem('activeWorkingFile', filename);
      const session = getActiveSession();
      if (session) { session.activeWorkingFile = filename; saveHistory(); }
      await fetch(`${BACKEND}/api/files/switch/${encodeURIComponent(filename)}`, { method: 'POST' });
      await loadActiveFileChip();
      addMessage('bot', '', `<div style="color:var(--easy);font-weight:600">✅ File switched to <b>${filename}</b> successfully! You can now ask questions about this file.</div>`);

      const messages = session?.messages || [];
      const lastUserMsg = [...messages].reverse().find(m => m.role === 'user');
      const skipKeywords = ['switch', 'file', 'use this', 'change file', 'i want'];
      const shouldSkip = lastUserMsg && skipKeywords.some(k => lastUserMsg.content.toLowerCase().includes(k));
      if (lastUserMsg && !shouldSkip) {
        const text = lastUserMsg.content;
        let intent;
        try {
          const ir = await fetch(`${BACKEND}/api/intent`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ message: text, filename: activeWorkingFile }) });
          intent = ir.ok ? await ir.json() : { type: 'chat' };
          if (!intent.type && intent.intent) intent.type = intent.intent;
          if (intent.type === 'show_questions') intent.type = 'show';
        } catch { intent = { type: 'chat' }; }
        const tr = document.createElement('div'); tr.className = 'msg-row bot';
        tr.innerHTML = `<div class="msg-avatar">M</div><div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
        document.getElementById('chat-wrap').appendChild(tr);
        document.getElementById('chat-wrap').scrollTop = 99999;
        let html = '';
        switch (intent.type) {
          case 'stats': html = await handleStats(intent); break;
          case 'topics': html = await handleTopics(session, intent); break;
          case 'show':
          case 'mcqs': html = await handleShowMcqs(intent, text); break;
          case 'multiTopics': html = await handleMultiTopics(intent); break;
          case 'export': html = await handleExportIntent(intent); break;
          case 'files': html = await handleListFiles(intent); break;
          case 'convert': html = await handleConvert(); break;
          default: html = await handleChatFallback(text, session); break;
        }
        tr.remove();
        addMessage('bot', '', html);
      }
    }

    function hideStopButton() { document.getElementById('send-btn').style.display = 'flex'; document.getElementById('stop-btn').style.display = 'none'; abortController = null; }

    // ─── FILE SELECTION HELPERS ───────────────────────────────────────────────

    async function getAllSessionFiles() {
      const session = getActiveSession();
      let files = [...(session?.uploadedFiles || [])];
      try {
        const r = await fetch(`${BACKEND}/api/files/active`);
        if (r.ok) {
          const d = await r.json();
          const fn = d.filename || d.active;
          if (fn && !files.find(f => f.name === fn)) files.push({ name: fn, count: 0 });
        }
      } catch { }
      return files;
    }

    async function handleConvert() {
      // Find the CSV chip name
      const csvChip = pendingFiles.find(f => f.name.endsWith('.csv'));

      if (!csvChip) {
        return `<div style="color:var(--hard)">⚠️ Please upload a CSV file first, then type "convert".</div>`;
      }

      try {
        // Fetch the CSV directly from the uploads folder on the server
        const resp = await fetch(`${BACKEND}/uploads/${encodeURIComponent(csvChip.name)}`);
        if (!resp.ok) throw new Error('Could not fetch uploaded CSV file.');
        const blob = await resp.blob();
        const csvFile = new File([blob], csvChip.name, { type: 'text/csv' });

        const fd = new FormData();
        fd.append('file', csvFile, csvFile.name);

        const r = await fetch(`${BACKEND}/api/convert/csv-to-sdm`, {
          method: 'POST',
          body: fd
        });

        if (!r.ok) {
          const err = await r.json().catch(() => ({}));
          throw new Error(typeof err.detail === 'string' ? err.detail : JSON.stringify(err.detail));
        }

        const data = await r.json();
        window._convertedSDM = data.sdm;
        window._convertedFilename = data.filename;

        return `<div>
      <div style="color:var(--easy);font-weight:600;margin-bottom:10px">✅ Converted successfully!</div>
      <div style="padding:10px 14px;background:var(--surface2);border-radius:8px;border:1px solid var(--border);margin-bottom:12px;font-size:12px">
        <div>📄 <b>${data.filename}</b></div>
        <div style="color:var(--text3);margin-top:4px">${data.groups} groups · ${data.questions} questions</div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="export-btn-inline xlsx" onclick="downloadConvertedSDM()">📥 Download SDM File</button>
        <button class="export-btn-inline docx" onclick="startConvertedConversation()">💬 Start Conversation</button>
      </div>
    </div>`;
      } catch (e) {
        return `<div style="color:var(--hard)">⚠️ ${e.message || 'Conversion failed.'}</div>`;
      }
    }
    function downloadConvertedSDM() {
      if (!window._convertedSDM) return;
      const blob = new Blob([JSON.stringify(window._convertedSDM, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = window._convertedFilename || 'converted_sdm.json';
      a.click();
      URL.revokeObjectURL(url);
      addMessage('bot', '', `<div style="color:var(--easy)">✅ Downloaded <b>${window._convertedFilename}</b>!</div>`);
    }

    async function startConvertedConversation() {
      if (!window._convertedSDM || !window._convertedFilename) return;
      try {
        // Upload the converted SDM to backend
        const blob = new Blob([JSON.stringify(window._convertedSDM)], { type: 'application/json' });
        const file = new File([blob], window._convertedFilename, { type: 'application/json' });
        const fd = new FormData();
        fd.append('file', file);
        const r = await fetch(`${BACKEND}/api/files/upload`, { method: 'POST', body: fd });
        if (!r.ok) throw new Error();
        const data = await r.json();

        // Set as active file
        activeWorkingFile = data.filename || window._convertedFilename;
        localStorage.setItem('activeWorkingFile', activeWorkingFile);
        const session = getActiveSession();
        if (session) {
          session.activeWorkingFile = activeWorkingFile;
          if (!session.uploadedFiles) session.uploadedFiles = [];
          session.uploadedFiles.push({ name: activeWorkingFile, count: data.count || 0 });
          saveHistory();
        }
        await fetch(`${BACKEND}/api/files/switch/${encodeURIComponent(activeWorkingFile)}`, { method: 'POST' });
        await loadActiveFileChip();

        addMessage('bot', '', `<div style="color:var(--easy);font-weight:600">✅ <b>${activeWorkingFile}</b> is now active!<br><span style="color:var(--text3);font-size:11px">You can now ask questions like "show all questions".</span></div>`);

        addMessage('bot', '', `<div style="color:var(--hard)">⚠️ Failed to start conversation.</div>`);

    async function checkFileAndRun(action, intent, label) {
      if (activeWorkingFile) {
        await fetch(`${BACKEND}/api/files/switch/${encodeURIComponent(activeWorkingFile)}`, { method: 'POST' });
      }
      return null;
    }

    async function handleFileSelectFlow(text) {
      if (!pendingFileSelect) return `<div style="color:var(--text2)">No pending operation.</div>`;
      const filename = text.trim();
      const { action, intent } = pendingFileSelect;
      pendingFileSelect = null;
      try {
        await fetch(`${BACKEND}/api/files/switch/${encodeURIComponent(filename)}`, { method: 'POST' });
        await loadActiveFileChip();
      } catch { }
      const session = getActiveSession();
      switch (action) {
        case 'delete': return await _doDelete(intent);
        case 'edit': return await _doEditDirect(intent);
        case 'mcqs': return await _doShowMcqs(intent);
        case 'topics': return await _doTopics(session, intent);
        case 'stats': return await _doStats(intent);
        case 'export': return _doExportIntent(intent);
        case 'download_topics': return await _doDownloadTopics(intent);
        case 'multiDelete': return await handleMultiDelete(intent);
        case 'add':
          pendingQuestion = { step: 'awaiting_question' };
          return `<div><div style="font-weight:600;margin-bottom:8px;font-size:13px">➕ Add a Question</div><div style="color:var(--text2);font-size:12px;margin-bottom:8px">Paste in this format and send:</div><div style="background:var(--surface2);border-radius:8px;padding:12px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2);line-height:1.9;border:1px solid var(--border)">What is Python?<br>A) A snake<br>B) A programming language<br>C) A framework<br>D) A database<br>Answer: B<br>Difficulty: Easy<br>Topic: Python<br>Position: 3</div><div style="color:var(--text3);font-size:11px;margin-top:6px">💡 Position and Topic are optional.</div></div>`;
        default: return `<div style="color:var(--hard)">⚠️ Unknown action.</div>`;
      }
    }

    function confirmAction() {
      if (pendingDelete?.step === 'awaiting_confirm_option') {
        const { questionId, qNum, optKey, optField, optValue } = pendingDelete;
        pendingDelete = null;
        fetch(`${BACKEND}/api/mcqs/${questionId}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ updates: { [optField]: '' } })
        })
          .then(r => r.ok
            ? addMessage('bot', '', `<div style="color:var(--easy);font-weight:600">✅ Deleted option <b>${optKey}: ${optValue}</b> from Q${qNum}!</div>`)
            : addMessage('bot', '', `<div style="color:var(--hard)">⚠️ Delete failed.</div>`))
          .catch(() => addMessage('bot', '', `<div style="color:var(--hard)">⚠️ Delete failed.</div>`));
        return;
      }
      if (pendingDelete?.step === 'awaiting_confirm') {
        const id = pendingDelete.questionId;
        const pos = pendingDelete.pos;
        const topic = pendingDelete.topic;
        pendingDelete = null;
        fetch(`${BACKEND}/api/mcqs/${id}`, { method: 'DELETE' })
          .then(r => r.ok ? addMessage('bot', '', `<div style="color:var(--easy)">✅ Deleted question ${pos} from <b>${topic}</b>!</div>`)
            : addMessage('bot', '', `<div style="color:var(--hard)">⚠️ Delete failed.</div>`))
          .catch(() => addMessage('bot', '', `<div style="color:var(--hard)">⚠️ Delete failed.</div>`));
      } else if (pendingDelete?.step === 'awaiting_confirm_all') {
        const pool = pendingDelete.pool;
        const topic = pendingDelete.topic;
        pendingDelete = null;
        let deleted = 0;
        const deleteNext = (i) => {
          if (i >= pool.length) {
            addMessage('bot', '', `<div style="color:var(--easy)">✅ Deleted all <b>${deleted}</b> <b>${topic}</b> questions!</div>`);
            return;
          }
          const id = pool[i].id || pool[i]._id;
          if (!id) { deleteNext(i + 1); return; }
          fetch(`${BACKEND}/api/mcqs/${id}`, { method: 'DELETE' })
            .then(r => { if (r.ok) deleted++; deleteNext(i + 1); });
        };
        deleteNext(0);
      } else if (pendingEdit?.step === 'awaiting_confirm') {
        const { question, changes, questionNum } = pendingEdit;
        pendingEdit = null;
        if (!Object.keys(changes).length) { addMessage('bot', '', `<div style="color:var(--text2)">No changes were made.</div>`); return; }
        fetch(`${BACKEND}/api/mcqs/${question.id}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ updates: changes })
        }).then(r => r.json()).then(data => {
          addMessage('bot', '', `<div><div style="color:var(--easy);font-weight:600;margin-bottom:8px">✅ Question ${questionNum} updated!</div>${buildMcqCard(data.mcq || { ...question, ...changes }, questionNum)}</div>`);
        }).catch(() => addMessage('bot', '', `<div style="color:var(--hard)">⚠️ Failed to update.</div>`));
      }
    }

    function cancelAction() {
      pendingDelete = null;
      pendingEdit = null;
      addMessage('bot', '', `<div style="color:var(--text2)">❌ Cancelled.</div>`);
    }

    // ─── SEND MESSAGE ─────────────────────────────────────────────────────────

    async function sendMessage() {
      const input = document.getElementById('msg-input'); const text = input.value.trim();
      if (!text || isStreaming) return;
      input.value = ''; autoResize(input);
      const session = getActiveSession(); if (!session) return;
      addMessage('user', text);

      // Handle pending file selection (for any operation)
      if (pendingFileSelect) {
        const tr2 = document.createElement('div'); tr2.className = 'msg-row bot';

        document.getElementById('chat-wrap').appendChild(tr2);
        isStreaming = true; showStopButton();
        const reply = await handleFileSelectFlow(text);
        tr2.remove(); addMessage('bot', '', reply);
        isStreaming = false; hideStopButton();
        return;
      }

      if (pendingEdit) {
        const tr2 = document.createElement('div'); tr2.className = 'msg-row bot';
        tr2.innerHTML = `<div class="msg-avatar">M</div><div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
        document.getElementById('chat-wrap').appendChild(tr2);
        isStreaming = true; showStopButton();
        const reply = await handleEditFlow(text);
        tr2.remove(); addMessage('bot', '', reply);
        isStreaming = false; hideStopButton();
        return;
      }

      if (pendingDelete) {
        const tr2 = document.createElement('div'); tr2.className = 'msg-row bot';
        tr2.innerHTML = `<div class="msg-avatar">M</div><div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
        document.getElementById('chat-wrap').appendChild(tr2);
        isStreaming = true; showStopButton();
        const reply = await handleDeleteFlow(text);
        tr2.remove(); addMessage('bot', '', reply);
        isStreaming = false; hideStopButton();
        return;
      }

      if (pendingQuestion) {
        const tr2 = document.createElement('div'); tr2.className = 'msg-row bot';
        tr2.innerHTML = `<div class="msg-avatar">M</div><div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
        document.getElementById('chat-wrap').appendChild(tr2);
        isStreaming = true; showStopButton();
        const reply = await handleSubmitQuestion(text);
        tr2.remove(); addMessage('bot', '', reply);
        isStreaming = false; hideStopButton();
        return;
      }

      const hasMultipleFiles = (session?.uploadedFiles || []).length > 1;
      if (hasMultipleFiles && !activeWorkingFile) {
        const fileBtns = (session.uploadedFiles || []).map(f =>
          `<button class="suggestion-chip" onclick="selectWorkingFile('${f.name}')">${f.name}</button>`
        ).join('');
        addMessage('bot', '', `<div>
      <div style="font-weight:600;font-size:13px;margin-bottom:8px">⚠️ Please select a file first!</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px">${fileBtns}</div>
    </div>`);
        isStreaming = false;
        return;
      }

      // Show typing dots FIRST before any backend call
      isStreaming = true; abortController = new AbortController(); showStopButton();
      const tr = document.createElement('div'); tr.className = 'msg-row bot';
      tr.innerHTML = `<div class="msg-avatar">M</div><div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
      document.getElementById('chat-wrap').appendChild(tr);
      document.getElementById('chat-wrap').scrollTop = 99999;

      let intent;
      try {
        const ir = await fetch(`${BACKEND}/api/intent`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, filename: activeWorkingFile }),
          signal: abortController.signal
        });
        intent = ir.ok ? await ir.json() : { type: 'chat' };

        // Normalize type field
        if (!intent.type && intent.intent) intent.type = intent.intent;

        // Resolve group number to actual group name on the frontend
        if (intent.group?.name) {
          const groupMatch = intent.group.name.match(/^group\s*(\d+)$/i);
          if (groupMatch && activeWorkingFile) {
            try {
              const gRes = await fetch(`${BACKEND}/api/mcqs?filename=${encodeURIComponent(activeWorkingFile)}&_t=${Date.now()}`);
              const gData = await gRes.json();
              const allQs = gData.mcqs || gData.questions || [];
              const groupNames = [...new Set(allQs.map(q => q.topic).filter(Boolean))];
              const idx = parseInt(groupMatch[1]) - 1;
              if (idx >= 0 && idx < groupNames.length) {
                intent.topic = groupNames[idx];
              } else {
                intent.topic = intent.group.name;
              }
            } catch {
              intent.topic = intent.group.name;
            }
          } else {
            intent.topic = intent.group.name;
          }
        }

        console.log('INTENT TYPE:', intent.type, JSON.stringify(intent));
      } catch { intent = { type: 'chat' }; }

      try {
        let html = '';
        switch (intent.type) {
          case 'stats': html = await handleStats(intent); break;
          case 'topics': html = await handleTopics(session, intent); break;
          case 'export': html = await handleExportIntent(intent); break;
          case 'download_topics': html = await handleDownloadTopics(intent); break;
          case 'delete':
            console.log('BEFORE handleDelete:', JSON.stringify(intent));
            if (intent.target === 'option') {
              html = await handleDeleteOption(intent);
            } else {
              html = await handleDelete(intent);
            }
            break;
          case 'edit':
            if (intent.target === 'question' && intent.text && intent.questionNum) {
              html = await addOptionToQuestion(intent.questionNum, intent.text);
            } else {
              html = await handleEdit(intent);
            }
            break;
          case 'edit_question':
            if (intent.text && intent.questionNum) {
              html = await addOptionToQuestion(intent.questionNum, intent.text);
            } else {
              html = await handleEdit(intent);
            }
            break;
          case 'multiDelete': html = await handleMultiDelete(intent); break;
          case 'submit_question': html = await handleSubmitQuestion(text); break;
          case 'add': html = await handleAdd(intent, text); break;
          case 'delete_option': html = await handleDeleteOption(intent); break;
          case 'convert': html = await handleConvert(); break;
          case 'show':
          case 'mcqs': html = await handleShowMcqs(intent, text); break;
          case 'practice': html = await handlePracticeMode(); break;
          case 'switch': html = await handleSwitch(intent); break;
          case 'files': html = await handleListFiles(intent); break;
          case 'multiTopics': html = await handleMultiTopics(intent); break;
          case 'saveCustom': html = await handleSaveCustom(); break;
          default: html = await handleChatFallback(text, session); break;
        }
        tr.remove(); addMessage('bot', '', html);
      } catch (err) {
        tr.remove();
        if (err.name === 'AbortError') addMessage('bot', '', `<div style="color:var(--text2)">⚠️ Request cancelled.</div>`);
        else addMessage('bot', '', `<div style="color:var(--hard)">⚠️ ${err.message || 'Error connecting to backend.'}</div>`);
      }
      isStreaming = false; hideStopButton();
    }

    // ─── HANDLERS (public — each checks file first) ───────────────────────────

      return await _doStats(intent);

    }

        return await _doExportShown(intent);

      if (!intent.topic && !intent.difficulty && !intent.specific && !intent.limit && !intent.random) {
        // Show ALL questions directly instead of asking topic
        return await _doShowMcqs({ ...intent, topic: null });

    async function handlePracticeMode() {
      try {
        const r = await fetch(`${BACKEND}/api/mcqs?_t=${Date.now()}`);
        const data = await r.json();
        const questions = data.mcqs || data.questions || [];
        if (!questions.length) return `<div style="color:var(--text2)">No questions found. Upload a file first.</div>`;
        window._practiceAllQuestions = questions;
        window._practiceFullList = questions;
        const topics = [...new Set(questions.map(q => q.topic).filter(Boolean))];
        if (topics.length > 1) {
          _sqFlow.questions = questions;
          _sqFlow.step = 'topic';
          _sqFlow.isPractice = true;
          showTopicStep(topics);
          return '';
        }
        _sqFlow.topic = topics[0];
        _sqFlow.isPractice = true;
        const difficulties = [...new Set(questions.map(q => q.difficulty).filter(Boolean))];
        const hasDifficulty = difficulties.some(d => d.toLowerCase() !== 'medium') || difficulties.length > 1;
        if (hasDifficulty) { _sqFlow.step = 'difficulty'; showDifficultyStep(); return ''; }
        return buildPracticeView(questions, null);
      } catch {
        return `<div style="color:var(--hard)">⚠️ Could not fetch questions.</div>`;
      }
    }

    // ─── INTERNAL IMPLEMENTATIONS ─────────────────────────────────────────────
    async function _doStats(intent) {
      const currentSession = getActiveSession();
      if (!activeWorkingFile) {
        return `<div style="color:var(--text2)">No file uploaded in this chat yet. Upload a file first.</div>`;
      }
      try {
        const r = await fetch(`${BACKEND}/api/files/stats`);

        return s?.fileContext ? `<div>📊 ${s.fileContext}</div>` : `<div style="color:var(--text2)">No files loaded.</div>`;
      }
    }

    async function _doTopics(session, intent) {
      const currentSession = getActiveSession();
      if (!activeWorkingFile && !(intent && intent.filename)) {
        return `<div style="color:var(--text2)">No file uploaded in this chat yet. Upload a file first to see topics.</div>`;
      }
      try {
        let url = `${BACKEND}/api/mcqs`;
        if (intent && intent.filename) url += `?filename=${encodeURIComponent(intent.filename)}`;
        const r = await fetch(url);
        const data = await r.json(); const questions = data.mcqs || data.questions || [];
        if (!questions.length) return `<div style="color:var(--text2)">No questions loaded. Upload a file first.</div>`;
        const topics = {}; questions.forEach(q => { const t = q.topic || 'General'; topics[t] = (topics[t] || 0) + 1; });
        const diffs = {}; questions.forEach(q => { const d = q.difficulty || 'Medium'; diffs[d] = (diffs[d] || 0) + 1; });
        const topicRows = Object.entries(topics).map(([t, c]) => `<div style="padding:7px 10px;background:var(--surface2);border-radius:6px;margin:3px 0;display:flex;justify-content:space-between;font-size:12px"><span>📁 ${t}</span><span style="color:var(--text2);font-weight:600">${c}Q</span></div>`).join('');
        const diffRows = Object.entries(diffs).map(([d, c]) => {
          const color = d.toLowerCase() === 'easy' ? 'var(--easy)' : d.toLowerCase() === 'hard' ? 'var(--hard)' : 'var(--medium)';
          return `<div style="padding:7px 10px;background:var(--surface2);border-radius:6px;margin:3px 0;display:flex;justify-content:space-between;font-size:12px"><span style="color:${color}">● ${d}</span><span style="color:var(--text2);font-weight:600">${c}Q</span></div>`;
        }).join('');
        const fname = (intent && intent.filename) ? intent.filename : 'Active file';
        return `<div>
          <div style="font-weight:600;margin-bottom:8px;font-size:13px">🗂️ ${fname} — ${questions.length} questions</div>
          <div style="font-weight:500;font-size:11px;color:var(--text3);margin:8px 0 4px">TOPICS</div>${topicRows}
          <div style="font-weight:500;font-size:11px;color:var(--text3);margin:8px 0 4px">DIFFICULTY</div>${diffRows}
        </div>`;
      } catch { return session?.fileContext ? `<div>🗂️ ${session.fileContext}</div>` : `<div style="color:var(--text2)">No file uploaded.</div>`; }

          </div>
        </div>`;
      } catch { return `<div style="color:var(--hard)">⚠️ Could not fetch questions.</div>`; }

    async function _doDelete(intent) {
      try {
        const r = await fetch(`${BACKEND}/api/mcqs`);
        if (!r.ok) throw new Error();
        const data = await r.json();
        const questions = data.mcqs || data.questions || [];
        if (!questions.length) return `<div style="color:var(--text2)">No questions to delete.</div>`;

        const topics = [...new Set(questions.map(q => q.topic).filter(Boolean))];

        // Normalize: model returns intent.group.name, handler expects intent.topic
        if (!intent.topic && intent.group?.name) {
          intent.topic = intent.group.name;
        }

        console.log('DELETE intent.topic:', intent.topic);
        console.log('ALL topics in file:', topics);

        // If no topic, ask
        if (!intent.topic) {
          pendingDelete = { step: 'awaiting_topic', questions };
          const topicBtns = topics.map(t =>
            `<button class="suggestion-chip" onclick="document.getElementById('msg-input').value='${t}';sendMessage()">${t}</button>`
          ).join('');
          return `<div>
        <div style="font-weight:600;font-size:13px;margin-bottom:8px">❌ Which topic do you want to delete from?</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px">${topicBtns}</div>
      </div>`;
        }

        // Topic given — find questions for that topic
        const topicQs = questions.filter(q =>
          (q.topic || '').toLowerCase().includes(intent.topic.toLowerCase())
        );
        if (!topicQs.length) return `<div style="color:var(--hard)">⚠️ No "${intent.topic}" questions found.</div>`;

        // If questionNum is already known, go straight to confirm
        if (intent.questionNum) {
          const qNum = parseInt(String(intent.questionNum).replace(/[^0-9]/g, ''));
          if (!qNum || isNaN(qNum)) return `<div style="color:var(--hard)">⚠️ Could not understand question number "${intent.questionNum}".</div>`;
          const target = topicQs[qNum - 1];
          if (!target) return `<div style="color:var(--hard)">⚠️ Question ${qNum} not found in "${intent.topic}". Only ${topicQs.length} exist.</div>`;
          pendingDelete = { questionId: target.id, pos: qNum, topic: intent.topic, step: 'awaiting_confirm' };
          return `<div>
        <div style="font-weight:600;margin-bottom:8px;font-size:13px">❌ Confirm Delete?</div>
        ${buildMcqCard(target, intent.questionNum, false, true)}
        <div style="margin-top:10px;display:flex;gap:8px">
          <button class="export-btn-inline xlsx" onclick="confirmAction()">✅ Yes, Delete</button>
          <button class="export-btn-inline pdf" onclick="cancelAction()">❌ No, Cancel</button>
        </div>
      </div>`;
        }

        // No questionNum — ask All or Specific
        pendingDelete = { pool: topicQs, topic: intent.topic, step: 'awaiting_number' };
        return `<div>
      <div style="font-weight:600;font-size:13px;margin-bottom:8px">
        ❌ <span style="color:var(--accent)">${intent.topic}</span> has
        <span style="color:var(--easy)">${topicQs.length}</span> questions.
      </div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:10px">What do you want to delete?</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="export-btn-inline pdf" onclick="deleteAll()">🗑️ Delete All ${topicQs.length}</button>
        <button class="export-btn-inline xlsx" onclick="deleteSpecific()">🔢 Specific number</button>
      </div>
    </div>`;

      } catch (err) {
        return `<div style="color:var(--hard)">⚠️ Delete failed: ${err.message}</div>`;
      }
    }

    async function handleDeleteFlow(text) {
      const lower = text.toLowerCase().trim();

      if (pendingDelete?.step === 'awaiting_number') {
        const qMatch = text.match(/[Qq](\d+)/) || text.match(/(\d+)/);
        const num = qMatch ? parseInt(qMatch[1]) : NaN;
        if (!num || num < 1 || num > pendingDelete.pool.length)
          return `<div style="color:var(--hard)">⚠️ Enter a number between 1 and ${pendingDelete.pool.length}.</div>`;
        const target = pendingDelete.pool[num - 1];
        pendingDelete = { questionId: target.id, pos: num, topic: pendingDelete.topic, step: 'awaiting_confirm' };
        return `<div>
        <div style="font-weight:600;margin-bottom:8px;font-size:13px">❌ Confirm Delete?</div>
        ${buildMcqCard(target, num, false, true)}
        <div style="margin-top:10px;display:flex;gap:8px">
          <button class="export-btn-inline xlsx" onclick="confirmAction()">✅ Yes, Delete</button>
          <button class="export-btn-inline pdf" onclick="cancelAction()">❌ No, Cancel</button>
        </div>
        </div>`;
      }

      if (pendingDelete?.step === 'awaiting_topic') {
        const pos = pendingDelete.pos;
        try {
          const r = await fetch(`${BACKEND}/api/mcqs`);
          const data = await r.json();
          const questions = data.mcqs || data.questions || [];
          const topicQs = questions.filter(q => (q.topic || '').toLowerCase().includes(lower));
          if (!topicQs.length) { pendingDelete = null; return `<div style="color:var(--hard)">⚠️ No "${lower}" questions found.</div>`; }
          if (!pos) {
            pendingDelete = { pool: topicQs, topic: lower, step: 'awaiting_number' };
            return `<div>
      <div style="font-weight:600;font-size:13px;margin-bottom:8px">❌ <span style="color:var(--accent)">${lower}</span> has <span style="color:var(--easy)">${topicQs.length}</span> questions.</div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:10px">What do you want to delete?</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="export-btn-inline pdf" onclick="deleteAll()">🗑️ Delete All ${topicQs.length}</button>
        <button class="export-btn-inline xlsx" onclick="deleteSpecific()">🔢 Specific number</button>
      </div>
    </div>`;
          }
          const target = topicQs[pos - 1];
          if (!target) { pendingDelete = null; return `<div style="color:var(--hard)">⚠️ Question ${pos} not found in topic "${lower}". Only ${topicQs.length} exist.</div>`; }
          pendingDelete = { questionId: target.id, pos, topic: lower, step: 'awaiting_confirm' };
          return `<div>
    <div style="font-weight:600;margin-bottom:8px;font-size:13px">❌ Confirm Delete?</div>
    ${buildMcqCard(target, pos, false, true)}
    <div style="margin-top:10px;display:flex;gap:8px">
      <button class="export-btn-inline xlsx" onclick="confirmAction()">✅ Yes, Delete</button>
      <button class="export-btn-inline pdf" onclick="cancelAction()">❌ No, Cancel</button>
    </div>
  </div>`;
        } catch { pendingDelete = null; return `<div style="color:var(--hard)">⚠️ Failed to fetch questions.</div>`; }
      }

      pendingDelete = null;
      return `<div style="color:var(--text2)">❌ Delete cancelled.</div>`;
    }

    async function handleMultiDelete(intent) {
      const pick = await checkFileAndRun('multiDelete', intent);
      if (pick) return pick;
      let totalDeleted = 0; let report = '';
      for (const { topic, count } of intent.multiDeletes) {
        const r = await fetch(`${BACKEND}/api/mcqs?topic=${encodeURIComponent(topic)}`);
        const data = await r.json();
        let tQ = Array.isArray(data) ? data : (data.mcqs || data.questions || []);
        if (tQ.length === 0) { report += `<div style="color:var(--hard);font-size:12px;margin:3px 0">⚠️ No "${topic}" questions found</div>`; continue; }
        tQ = tQ.filter(q => q.topic && q.topic.toLowerCase().includes(topic.toLowerCase()));
        const toDelete = tQ.slice(0, count); let deleted = 0;
        for (const q of toDelete) { const id = q.id || q._id; if (!id) continue; const dr = await fetch(`${BACKEND}/api/mcqs/${id}`, { method: 'DELETE' }); if (dr.ok) deleted++; }
        totalDeleted += deleted;
        report += `<div style="color:var(--easy);font-size:12px;margin:3px 0">✅ Deleted ${deleted} "${topic}" question${deleted > 1 ? 's' : ''}</div>`;
      }
      return `<div><div style="font-weight:600;margin-bottom:8px;font-size:13px">❌ Deleted ${totalDeleted} questions total</div>${report}</div>`;
    }

    async function _doEditDirect(intent) {
      try {
        const r = await fetch(`${BACKEND}/api/mcqs?_t=${Date.now()}`); if (!r.ok) throw new Error();
        const data = await r.json();
        const questions = Array.isArray(data) ? data : (data.mcqs || data.questions || []);
        if (!questions.length) return `<div style="color:var(--text2)">No questions loaded.</div>`;
        const topics = [...new Set(questions.map(q => q.topic).filter(Boolean))];

        if (intent.topic && !intent.questionNum) {
          const pool = questions.filter(q => (q.topic || '').toLowerCase().includes(intent.topic.toLowerCase()));
          if (!pool.length) return `<div style="color:var(--hard)">⚠️ No "${intent.topic}" questions found.</div>`;
          pendingEdit = { pool, topic: intent.topic, step: 'awaiting_number' };
          return `<div>
            <div style="font-weight:600;font-size:13px;margin-bottom:6px">✏️ <span style="color:var(--accent)">${intent.topic.charAt(0).toUpperCase() + intent.topic.slice(1)}</span> has <span style="color:var(--easy)">${pool.length}</span> questions.</div>
            <div style="font-size:12px;color:var(--text2);margin-top:4px">Which question number do you want to edit? (1–${pool.length})</div>
          </div>`;
        }
        if (intent.topic && intent.questionNum) {
          const pool = questions.filter(q => (q.topic || '').toLowerCase().includes(intent.topic));
          const q = pool[intent.questionNum - 1];
          if (!q) return `<div style="color:var(--hard)">⚠️ Question ${intent.questionNum} not found in ${intent.topic}. Only ${pool.length} exist.</div>`;
          pendingEdit = { question: q, questionNum: intent.questionNum, topic: intent.topic, changes: {}, step: 'awaiting_question_change' };
          return buildEditGuideStep(q, intent.questionNum, intent.topic, 'question');
        }
        if (intent.questionNum && !intent.topic) {
          if (topics.length === 1) {
            const q = questions[intent.questionNum - 1];
            if (!q) return `<div style="color:var(--hard)">⚠️ Question ${intent.questionNum} not found.</div>`;
            pendingEdit = { question: q, questionNum: intent.questionNum, topic: topics[0], changes: {}, step: 'awaiting_question_change' };
            return buildEditGuideStep(q, intent.questionNum, topics[0], 'question');
          }
          pendingEdit = { questionNum: intent.questionNum, step: 'awaiting_topic' };
          const topicBtns = topics.map(t => `<button class="suggestion-chip" onclick="document.getElementById('msg-input').value='${t}';sendMessage()">${t}</button>`).join(' ');
          return `<div><div style="font-weight:600;font-size:13px;margin-bottom:8px">✏️ Which topic's question ${intent.questionNum} do you want to edit?</div><div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px">${topicBtns}</div></div>`;
        }
        pendingEdit = { step: 'awaiting_topic' };
        const topicBtns = topics.map(t => `<button class="suggestion-chip" onclick="document.getElementById('msg-input').value='${t}';sendMessage()">${t}</button>`).join(' ');
        return `<div><div style="font-weight:600;font-size:13px;margin-bottom:8px">✏️ Which topic do you want to edit?</div><div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px">${topicBtns}</div></div>`;
      } catch { return `<div style="color:var(--hard)">⚠️ Could not fetch questions.</div>`; }
    }

    async function handleEditFlow(text) {
      const lower = text.trim().toLowerCase();
      const isSkip = (lower === 'skip');
      if (lower.includes('add') && lower.includes('question')) {
        pendingEdit = null;
        return await handleAdd();
      }

      if (pendingEdit?.step === 'awaiting_topic') {
        try {
          const r = await fetch(`${BACKEND}/api/mcqs?_t=${Date.now()}`);
          const data = await r.json();
          const questions = Array.isArray(data) ? data : (data.mcqs || data.questions || []);
          const pool = questions.filter(q => (q.topic || '').toLowerCase().includes(lower));
          if (!pool.length) return `<div style="color:var(--hard)">⚠️ No "${lower}" questions found.</div>`;
          pendingEdit.topic = lower;
          if (pendingEdit.questionNum) {
            const q = pool[pendingEdit.questionNum - 1];
            if (!q) return `<div style="color:var(--hard)">⚠️ Question ${pendingEdit.questionNum} not found in "${lower}". Only ${pool.length} exist.</div>`;
            pendingEdit.question = q; pendingEdit.step = 'awaiting_question_change';
            return buildEditGuideStep(q, pendingEdit.questionNum, lower, 'question');
          }
          pendingEdit.pool = pool; pendingEdit.step = 'awaiting_number';
          return `<div>
            <div style="font-weight:600;font-size:13px;margin-bottom:6px">✏️ <span style="color:var(--accent)">${lower.charAt(0).toUpperCase() + lower.slice(1)}</span> has <span style="color:var(--easy)">${pool.length}</span> questions.</div>
            <div style="font-size:12px;color:var(--text2)">Which question number do you want to edit? (1–${pool.length})</div>
          </div>`;
        } catch { pendingEdit = null; return `<div style="color:var(--hard)">⚠️ Failed to fetch questions.</div>`; }
      }

      if (pendingEdit?.step === 'awaiting_number') {
        const num = parseInt(lower);
        if (!num || num < 1 || num > pendingEdit.pool.length) return `<div style="color:var(--hard)">⚠️ Please enter a valid number between 1 and ${pendingEdit.pool.length}.</div>`;
        const q = pendingEdit.pool[num - 1];
        pendingEdit.question = q; pendingEdit.questionNum = num; pendingEdit.changes = {}; pendingEdit.step = 'awaiting_question_change';
        return buildEditGuideStep(q, num, pendingEdit.topic, 'question');
      }
      if (pendingEdit?.step === 'awaiting_question_change') {
        if (!isSkip) { pendingEdit.step = 'editing_question'; return `<div style="color:var(--accent);font-weight:600">Current question text:<br><span style="color:var(--text);font-size:12px">${pendingEdit.question.question}</span><br><br>Type the new question text:<br><span style="color:var(--text3);font-size:11px">(or type "skip" to keep it)</span></div>`; }
        pendingEdit.step = 'awaiting_optionA_change';
        return buildEditGuideStep(pendingEdit.question, pendingEdit.questionNum, pendingEdit.topic, 'option_a');
      }
      if (pendingEdit?.step === 'editing_question') {
        if (!isSkip) pendingEdit.changes.question = text.trim();
        pendingEdit.step = 'awaiting_optionA_change';
        return buildEditGuideStep(pendingEdit.question, pendingEdit.questionNum, pendingEdit.topic, 'option_a');
      }
      if (pendingEdit?.step === 'awaiting_optionA_change') {
        if (!isSkip) { pendingEdit.step = 'editing_optionA'; return `<div style="color:var(--accent);font-weight:600">Current Option A:<br><span style="color:var(--text);font-size:12px">${pendingEdit.question.option_a}</span><br><br>Type the new Option A:<br><span style="color:var(--text3);font-size:11px">(or type "skip")</span></div>`; }
        pendingEdit.step = 'awaiting_optionB_change';
        return buildEditGuideStep(pendingEdit.question, pendingEdit.questionNum, pendingEdit.topic, 'option_b');
      }
      if (pendingEdit?.step === 'editing_optionA') {
        if (!isSkip) pendingEdit.changes.option_a = text.trim();
        pendingEdit.step = 'awaiting_optionB_change';
        return buildEditGuideStep(pendingEdit.question, pendingEdit.questionNum, pendingEdit.topic, 'option_b');
      }
      if (pendingEdit?.step === 'awaiting_optionB_change') {
        if (!isSkip) { pendingEdit.step = 'editing_optionB'; return `<div style="color:var(--accent);font-weight:600">Current Option B:<br><span style="color:var(--text);font-size:12px">${pendingEdit.question.option_b}</span><br><br>Type the new Option B:<br><span style="color:var(--text3);font-size:11px">(or type "skip")</span></div>`; }
        pendingEdit.step = 'awaiting_optionC_change';
        return buildEditGuideStep(pendingEdit.question, pendingEdit.questionNum, pendingEdit.topic, 'option_c');
      }
      if (pendingEdit?.step === 'editing_optionB') {
        if (!isSkip) pendingEdit.changes.option_b = text.trim();
        pendingEdit.step = 'awaiting_optionC_change';
        return buildEditGuideStep(pendingEdit.question, pendingEdit.questionNum, pendingEdit.topic, 'option_c');
      }
      if (pendingEdit?.step === 'awaiting_optionC_change') {
        if (!isSkip) { pendingEdit.step = 'editing_optionC'; return `<div style="color:var(--accent);font-weight:600">Current Option C:<br><span style="color:var(--text);font-size:12px">${pendingEdit.question.option_c}</span><br><br>Type the new Option C:<br><span style="color:var(--text3);font-size:11px">(or type "skip")</span></div>`; }
        pendingEdit.step = 'awaiting_optionD_change';
        return buildEditGuideStep(pendingEdit.question, pendingEdit.questionNum, pendingEdit.topic, 'option_d');
      }
      if (pendingEdit?.step === 'editing_optionC') {
        if (!isSkip) pendingEdit.changes.option_c = text.trim();
        pendingEdit.step = 'awaiting_optionD_change';
        return buildEditGuideStep(pendingEdit.question, pendingEdit.questionNum, pendingEdit.topic, 'option_d');
      }
      if (pendingEdit?.step === 'awaiting_optionD_change') {
        if (!isSkip) { pendingEdit.step = 'editing_optionD'; return `<div style="color:var(--accent);font-weight:600">Current Option D:<br><span style="color:var(--text);font-size:12px">${pendingEdit.question.option_d}</span><br><br>Type the new Option D:<br><span style="color:var(--text3);font-size:11px">(or type "skip")</span></div>`; }
        pendingEdit.step = 'awaiting_answer_change';
        return buildEditGuideStep(pendingEdit.question, pendingEdit.questionNum, pendingEdit.topic, 'answer');
      }
      if (pendingEdit?.step === 'editing_optionD') {
        if (!isSkip) pendingEdit.changes.option_d = text.trim();
        pendingEdit.step = 'awaiting_answer_change';
        return buildEditGuideStep(pendingEdit.question, pendingEdit.questionNum, pendingEdit.topic, 'answer');
      }
      if (pendingEdit?.step === 'awaiting_answer_change') {
        if (!isSkip) { pendingEdit.step = 'editing_answer'; return `<div style="color:var(--accent);font-weight:600">Current Answer: <span style="color:var(--easy)">${pendingEdit.question.answer}</span><br><br>Type the new answer (A / B / C / D):<br><span style="color:var(--text3);font-size:11px">(or type "skip")</span></div>`; }
        pendingEdit.step = 'awaiting_difficulty_change';
        return buildEditGuideStep(pendingEdit.question, pendingEdit.questionNum, pendingEdit.topic, 'difficulty');
      }
      if (pendingEdit?.step === 'editing_answer') {
        if (!isSkip) pendingEdit.changes.answer = text.trim().toUpperCase();
        pendingEdit.step = 'awaiting_difficulty_change';
        return buildEditGuideStep(pendingEdit.question, pendingEdit.questionNum, pendingEdit.topic, 'difficulty');
      }
      if (pendingEdit?.step === 'awaiting_difficulty_change') {
        if (!isSkip) { pendingEdit.step = 'editing_difficulty'; return `<div style="color:var(--accent);font-weight:600">Current Difficulty: <span style="color:var(--medium)">${pendingEdit.question.difficulty}</span><br><br>Type the new difficulty (Easy / Medium / Hard):<br><span style="color:var(--text3);font-size:11px">(or type "skip")</span></div>`; }
        return buildEditPreview();
      }
      if (pendingEdit?.step === 'editing_difficulty') {
        if (!isSkip) pendingEdit.changes.difficulty = text.trim();
        return buildEditPreview();
      }

      pendingEdit = null;
      return `<div style="color:var(--text2)">Edit cancelled.</div>`;
    }

    function deleteAll() {
      const pool = pendingDelete.pool;
      const topic = pendingDelete.topic;
      pendingDelete = { pool, topic, step: 'awaiting_confirm_all' };
      addMessage('bot', '', `<div>
    <div style="font-weight:600;margin-bottom:8px;font-size:13px">❌ Delete ALL <span style="color:var(--accent)">${topic}</span> questions?</div>
    <div style="font-size:12px;color:var(--hard);margin-bottom:10px">⚠️ This cannot be undone! All ${pool.length} questions will be deleted.</div>
    <div style="display:flex;gap:8px">
      <button class="export-btn-inline pdf" onclick="confirmAction()">✅ Yes, Delete All</button>
      <button class="export-btn-inline xlsx" onclick="cancelAction()">❌ No, Cancel</button>
    </div>
  </div>`);
    }

    function deleteSpecific() {
      addMessage('bot', '', `<div style="font-size:12px;color:var(--text2)">Which question number? (1–${pendingDelete.pool.length})</div>`);
    }

    function skipEditField() {
      document.getElementById('msg-input').value = 'skip';
      sendMessage();
    }

    function buildEditGuideStep(q, num, topic, field) {
      const fieldLabels = { question: 'Question Text', option_a: 'Option A', option_b: 'Option B', option_c: 'Option C', option_d: 'Option D', answer: 'Answer', difficulty: 'Difficulty' };
      const currentVal = q[field] || ''; const label = fieldLabels[field] || field;
      return `<div>
        <div style="font-weight:600;font-size:13px;margin-bottom:6px">✏️ <span style="color:var(--accent)">${topic}</span> — Q${num}</div>
        <div style="background:var(--surface2);border-radius:8px;padding:10px 14px;border:1px solid var(--border);margin-bottom:10px">
          <div style="font-size:12px;color:var(--text2);margin-bottom:4px">Current <b>${label}</b>:</div>
          <div style="font-size:12px;color:var(--text)">${currentVal}</div>
        </div>
        <div style="font-size:12px;color:var(--text);margin-bottom:8px">Do you want to change the <b>${label}</b>?</div>
        <div style="display:flex;gap:8px">
          <button class="export-btn-inline xlsx" onclick="confirmFieldChange()">Yes, Change</button>
          <button class="export-btn-inline pdf" onclick="skipEditField()">Skip</button>
        </div>
      </div>`;
    }

    function confirmFieldChange() {
      if (!pendingEdit) return;
      // Advance the step from awaiting_X_change to editing_X
      const stepMap = {
        'awaiting_question_change': 'editing_question',
        'awaiting_optionA_change': 'editing_optionA',
        'awaiting_optionB_change': 'editing_optionB',
        'awaiting_optionC_change': 'editing_optionC',
        'awaiting_optionD_change': 'editing_optionD',
        'awaiting_answer_change': 'editing_answer',
        'awaiting_difficulty_change': 'editing_difficulty',
      };
      const nextStep = stepMap[pendingEdit.step];
      if (!nextStep) return;
      pendingEdit.step = nextStep;

      const prompts = {
        'editing_question': `Type the new question text:`,
        'editing_optionA': `Type the new Option A:`,
        'editing_optionB': `Type the new Option B:`,
        'editing_optionC': `Type the new Option C:`,
        'editing_optionD': `Type the new Option D:`,
        'editing_answer': `Type the new answer (A / B / C / D):`,
        // 'editing_difficulty': `Type the new difficulty (Easy / Medium / Hard):`,
      };
      addMessage('bot', '', `<div style="color:var(--accent);font-weight:600">${prompts[nextStep]}<br><span style="color:var(--text3);font-size:11px">(or type "skip" to keep it)</span></div>`);
    }

    function buildEditPreview() {
      const { question, changes, questionNum, topic } = pendingEdit;
      pendingEdit.step = 'awaiting_confirm';
      const preview = { ...question, ...changes };
      const changeList = Object.entries(changes).map(([k, v]) => `<div style="font-size:11px;color:var(--text2);margin:2px 0">• <b>${k}</b>: ${v}</div>`).join('');
      return `<div>
        <div style="font-weight:600;font-size:13px;margin-bottom:6px">👁 Preview — ${topic} Q${questionNum}</div>
        ${buildMcqCard(preview, questionNum)}
        ${changeList ? `<div style="margin-top:8px;padding:8px 12px;background:var(--surface2);border-radius:6px;border:1px solid var(--border)"><div style="font-size:11px;color:var(--text3);margin-bottom:4px">Changes made:</div>${changeList}</div>` : '<div style="color:var(--text3);font-size:12px;margin-top:6px">No changes made.</div>'}
        <div style="margin-top:10px;font-size:12px;color:var(--text2);margin-bottom:8px">Save all changes?</div>
        <div style="display:flex;gap:8px">
          <button class="export-btn-inline xlsx" onclick="confirmAction()">✅ Yes, Save</button>
          <button class="export-btn-inline pdf" onclick="cancelAction()">❌ No, Cancel</button>
        </div>
      </div>`;
    }

    async function _doShowMcqs(intent) {
      if (!intent.topic && intent.group?.name) intent.topic = intent.group.name;
      const currentSession = getActiveSession();
      if (!activeWorkingFile) activeWorkingFile = window._restoredFile || null;
      if (!activeWorkingFile) {
        return `<div style="color:var(--text2)">No file uploaded in this chat yet. Upload a file first to see questions.</div>`;
      }
      try {
        let url = `${BACKEND}/api/mcqs`;
        const qp = new URLSearchParams();
        if (intent.difficulty) qp.append('difficulty', intent.difficulty);
        if (intent.topic && intent.topic !== 'all') qp.append('topic', intent.topic);
        if (activeWorkingFile) qp.append('filename', activeWorkingFile);
        qp.append('_t', Date.now());
        url += `?${qp.toString()}`;
        const r = await fetch(url); if (!r.ok) throw new Error();
        const data = await r.json(); let questions = Array.isArray(data) ? data : (data.mcqs || data.questions || []);
        if (intent.topic && intent.topic !== 'all') questions = questions.filter(q => (q.topic || '').toLowerCase().includes(intent.topic.toLowerCase()));
        if (intent.topics && intent.topics.length > 0) questions = questions.filter(q => intent.topics.some(t => (q.topic || '').toLowerCase().includes(t.toLowerCase())));
        if (!questions.length) return `<div style="color:var(--text2)">No questions found${intent.topic ? ` for topic "${intent.topic}"` : ''}.</div>`;

        if (intent.multiTopicPos) {
          let allCards = ''; let totalShown = 0;
          for (const { topic, position } of intent.multiTopicPos) {
            const r2 = await fetch(`${BACKEND}/api/mcqs?topic=${encodeURIComponent(topic)}`);
            const d2 = await r2.json();
            let tQ = Array.isArray(d2) ? d2 : (d2.mcqs || d2.questions || []);
            if (tQ.length === questions.length) tQ = tQ.filter(q => q.topic && q.topic.toLowerCase().includes(topic.toLowerCase()));
            const idx = position - 1;
            if (idx >= 0 && idx < tQ.length) { allCards += `<div style="font-weight:600;font-size:12px;color:var(--accent);margin:8px 0 4px">${topic.charAt(0).toUpperCase() + topic.slice(1)} — Q${position}</div>`; allCards += buildMcqCard(tQ[idx], position); totalShown++; }
            else allCards += `<div style="color:var(--hard);font-size:12px;margin:4px 0">⚠️ ${topic} Q${position} not found (only ${tQ.length} exist)</div>`;
          }
          return `<div><div style="font-weight:600;margin-bottom:8px;font-size:13px">Showing ${totalShown} questions</div>${allCards}</div>`;
        }

        if (intent.multiTopics) {
          let allCards = ''; let totalShown = 0;
          for (const { topic, count } of intent.multiTopics) {
            const r2 = await fetch(`${BACKEND}/api/mcqs?topic=${encodeURIComponent(topic)}`);
            const d2 = await r2.json();
            let tQ = Array.isArray(d2) ? d2 : (d2.mcqs || d2.questions || []);
            if (tQ.length === questions.length) tQ = tQ.filter(q => q.topic && q.topic.toLowerCase().includes(topic.toLowerCase()));
            const tShown = tQ.slice(0, count);
            if (tShown.length) { allCards += `<div style="font-weight:600;font-size:12px;color:var(--accent);margin:8px 0 4px">${topic.charAt(0).toUpperCase() + topic.slice(1)} (${tShown.length})</div>`; allCards += tShown.map((q, i) => buildMcqCard(q, i + 1)).join(''); totalShown += tShown.length; }
            else allCards += `<div style="color:var(--hard);font-size:12px;margin:4px 0">⚠️ No "${topic}" questions found</div>`;
          }
          if (!allCards || totalShown === 0) return `<div style="color:var(--hard)">⚠️ No matching questions found.</div>`;
          return `<div><div style="font-weight:600;margin-bottom:8px;font-size:13px">Showing ${totalShown} questions across ${intent.multiTopics.length} topics</div>${allCards}</div>`;
        }

        let shown = []; let label = '';
        if (intent.specificList) { shown = intent.specificList.map(n => questions[n - 1]).filter(Boolean); label = `Questions ${intent.specificList.filter(n => n >= 1 && n <= questions.length).join(', ')}`; }
        else if (intent.specific) { const idx = intent.specific - 1; if (idx < 0 || idx >= questions.length) return `<div style="color:var(--hard)">⚠️ Question ${intent.specific} not found. Only ${questions.length} questions exist.</div>`; shown = [questions[idx]]; label = `Question ${intent.specific}`; }
        else if (intent.random) { const n = Math.min(intent.random, questions.length); const shuffled = [...questions].sort(() => Math.random() - 0.5); shown = shuffled.slice(0, n); label = `${n} random questions`; }
        else if (intent.middle) { const n = Math.min(intent.middle, questions.length); const mid = Math.floor(questions.length / 2); const start = Math.max(0, mid - Math.floor(n / 2)); shown = questions.slice(start, start + n); label = `Middle ${shown.length} questions`; }
        else if (intent.rangeFrom && intent.rangeTo) { shown = questions.slice(intent.rangeFrom - 1, intent.rangeTo); label = `Questions ${intent.rangeFrom} to ${intent.rangeTo}`; }
        else if (intent.limit !== undefined && intent.limit > 0) { shown = intent.fromEnd ? questions.slice(-intent.limit) : questions.slice(0, intent.limit); label = intent.fromEnd ? `Last ${shown.length}` : `First ${shown.length}`; }
        else {
          window._practiceAllQuestions = questions;
          window._practiceFullList = questions;
          window._skipLoadResponses = true;

          // If a specific group was requested, jump directly to it
          if (intent.topic) {
            const groups = [...new Set(questions.map(q => q.topic).filter(Boolean))];
            const groupIndex = groups.findIndex(g => g.toLowerCase() === intent.topic.toLowerCase());
            _formFlow = {
              active: true,
              groups,
              currentIndex: groupIndex >= 0 ? groupIndex : 0,
              answers: {}
            };
            return buildNormalView(questions, intent.topic);
          }

          _formFlow = { active: false, groups: [], currentIndex: 0, answers: {} };
          return buildNormalView(questions, null);
        }
        const cards = shown.map((q, i) => {
          let num;
          if (intent.specificList) num = intent.specificList[i];
          else if (intent.specific) num = intent.specific;
          else if (intent.random) num = '★';
          else if (intent.fromEnd) num = questions.length - shown.length + i + 1;
          else if (intent.middle) { const mid = Math.floor(questions.length / 2); const start = Math.max(0, mid - Math.floor(shown.length / 2)); num = start + i + 1; }
          else num = i + 1;
          return buildMcqCard(q, num);
        }).join('');
        const more = !intent.limit && !intent.specific && !intent.specificList && !intent.random && !intent.middle && questions.length > 20 ? `<div style="color:var(--text3);font-size:11px;margin-top:6px">… and ${questions.length - 20} more</div>` : '';
        return `<div><div style="font-weight:600;margin-bottom:8px;font-size:13px">Showing ${shown.length} of ${questions.length} — ${label}</div>${cards}${more}</div>`;
      } catch { return `<div style="color:var(--hard)">Could not fetch questions. Is backend running?</div>`; }
    }
    function loadMoreMcqs() {

      const { all, offset } = window._mcqPage;
      const pageSize = 10;
      const nextBatch = all.slice(offset, offset + pageSize);
      const newOffset = offset + pageSize;
      window._mcqPage.offset = newOffset;
      const remaining = all.length - newOffset;

      const wrap = document.getElementById('load-more-wrap');
      if (!wrap) return;

      // Insert cards before the button
      nextBatch.forEach((q, i) => {
        const div = document.createElement('div');

      });

      if (remaining > 0) {

    async function handleSubmitQuestion(text) {
      if (pendingQuestion && pendingQuestion.step === 'awaiting_question') { pendingQuestion = null; return await handleSubmitQuestion(text); }
      if (pendingQuestion && pendingQuestion.step === 'awaiting_topic') {
        pendingQuestion.topic = text.trim(); pendingQuestion.step = 'awaiting_position';
        return `<div style="color:var(--accent);font-weight:600">Got it! Topic set to <b>${pendingQuestion.topic}</b> 👍<br><br>Where should I add it?<br><span style="color:var(--text2);font-size:12px">Type: <b>first</b> / <b>last</b> / <b>after question 5</b> / <b>position 3</b></span></div>`;
      }
      if (pendingQuestion && pendingQuestion.step === 'awaiting_position') {
        const v = text.trim().toLowerCase(); let position = null;
        if (v === 'first') position = 1;
        else if (v === 'last') position = null;
        else {
          const m = v.match(/(?:after\s+(?:question\s+)?|position\s*|at\s+)(\d+)/);
          if (m) position = parseInt(m[1]) + (v.includes('after') ? 1 : 0);
        }
        pendingQuestion.position = position;
        const body = { ...pendingQuestion }; delete body.step; pendingQuestion = null;
        try {
          const r = await fetch(`${BACKEND}/api/mcqs/add`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
          if (!r.ok) { const err = await r.json(); throw new Error(err.detail || 'Failed to save'); }
          const data = await r.json(); const posLabel = position ? `position ${position}` : 'end of list';
          window._mcqCacheBust = Date.now();
          return `<div><div style="color:var(--easy);font-weight:600;margin-bottom:8px">✅ Question added at ${posLabel} under <b>${body.topic}</b>!</div>${buildMcqCard(data.mcq || body, '★')}</div>`;
        } catch (e) {
          const msg = e.message || '';
          if (msg.includes('already exists')) return `<div style="color:var(--medium)">⚠️ This question already exists in the file! Duplicate not added.</div>`;
          return `<div style="color:var(--hard)">⚠️ Failed to save. Make sure backend is running.</div>`;
        }
      }
      const lines = text.split('\n').map(l => l.trim()).filter(l => l);
      let question = '', optMap = {}, answer = '', difficulty = 'Medium', topic = '', explanation = '';
      const optPat = /^[\(\[]?([A-Da-d1-4])[\)\]\.]\s*(.+)/, ansPat = /^(?:answer|ans)\s*[:\-]\s*(.+)/i, diffPat = /^difficulty\s*[:\-]\s*(.+)/i, topPat = /^topic\s*[:\-]\s*(.+)/i, explPat = /^explanation\s*[:\-]\s*(.+)/i;
      const lm = { '1': 'A', '2': 'B', '3': 'C', '4': 'D' }; let qFound = false;
      for (const line of lines) {
        if (optPat.test(line) || ansPat.test(line) || diffPat.test(line) || topPat.test(line) || explPat.test(line)) continue;
        if (!qFound) { const m = line.match(/^(?:Q[\d]*[\.\)]\s*|Question\s*:\s*)?(.+)/i); if (m) { question = m[1].trim(); qFound = true; } }
      }
      for (const line of lines) {
        let m;
        m = line.match(optPat); if (m) { const k = lm[m[1].toUpperCase()] || m[1].toUpperCase(); optMap[k] = m[2].trim(); continue; }
        m = line.match(ansPat); if (m) { const raw = m[1].trim(); const lmatch = raw.match(/^([A-Da-d1-4])[\)\.\s]?/); if (lmatch) { answer = lm[lmatch[1].toUpperCase()] || lmatch[1].toUpperCase(); } else { for (const [k, v] of Object.entries(optMap)) { if (raw.toLowerCase().includes(v.toLowerCase())) { answer = k; break; } } if (!answer) answer = ''; } continue; }
        m = line.match(diffPat); if (m) { difficulty = m[1].trim(); continue; }
        m = line.match(topPat); if (m) { topic = m[1].trim(); continue; }
        m = line.match(explPat); if (m) { explanation = m[1].trim(); continue; }
      }
      if (!question || Object.keys(optMap).length < 2) return `<div style="color:var(--hard)">⚠️ Could not parse. Need question + 2 options + Answer: line.</div>`;
      if (topic) {
        pendingQuestion = { question, option_a: optMap['A'] || '', option_b: optMap['B'] || '', option_c: optMap['C'] || '', option_d: optMap['D'] || '', answer: answer, difficulty, topic, explanation, step: 'awaiting_position' };
        return `<div style="color:var(--accent);font-weight:600">✅ Parsed! Topic: <b>${topic}</b><br><br>Where should I add it?<br><span style="color:var(--text2);font-size:12px">Type: <b>first</b> / <b>last</b> / <b>after question 5</b> / <b>position 3</b></span></div>`;
      }
      pendingQuestion = { question, option_a: optMap['A'] || '', option_b: optMap['B'] || '', option_c: optMap['C'] || '', option_d: optMap['D'] || '', answer: answer, difficulty, topic: '', explanation, step: 'awaiting_topic' };
      return `<div style="color:var(--accent);font-weight:600">✅ Question parsed!<br><br>What topic is this question?<br><span style="color:var(--text2);font-size:12px">e.g. Python, Java, Web Tech, Database, Aptitude</span></div>`;
    }

    async function handleAdd(intent, originalText) {
      const text = originalText || '';
      const isAddOption = intent && intent.target === 'option' && intent.questionNum;
      if (isAddOption) {
        const qNum = intent.questionNum;
        // Parse option value from original text if model didn't extract it
        let optValue = intent.newValue || intent.optionValue || '';
        if (!optValue && originalText) {
          const lines = originalText.split('\n').map(l => l.trim()).filter(Boolean);
          optValue = lines[0]; // first line is the option value
        }
        if (qNum && optValue) {
          const optValues = optValue.split(/,+/).map(v => v.trim()).filter(Boolean);
          if (optValues.length > 1) {
            const results = [];
            for (const val of optValues) {
              await addOptionToQuestion(qNum, val, intent);
              results.push(val);
            }
            return `<div style="color:var(--easy);font-weight:600">✅ Added ${results.length} options to Q${qNum}: <b>${results.join(', ')}</b></div>`;
          }
          return await addOptionToQuestion(qNum, optValue, intent);
        }
      }

      console.log('DEBUG handleAdd intent:', JSON.stringify(intent));
      const questionText = intent.questionText || intent.text ||
        (originalText ? originalText.split('\n')[0].trim() : null);
      const autoGroupName = intent?.group?.name || intent?.topic;

      if (intent && questionText && autoGroupName) {
        const groupName = autoGroupName;
        // Parse options from original text
        const lines = (originalText || '').split('\n').map(l => l.trim()).filter(Boolean);
        const optMap = {};
        lines.forEach(line => {
          const m = line.match(/^[\(\[]?([A-Da-d])[\)\]\.]\s*(.+)/);
          if (m) optMap[m[1].toUpperCase()] = m[2].trim();
        });
        const ansLine = lines.find(l => /^answer\s*[:\-]/i.test(l));
        const answer = ansLine ? ansLine.replace(/^answer\s*[:\-]\s*/i, '').trim() : '';
        try {
          const r = await fetch(`${BACKEND}/api/mcqs/add`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              question: questionText,
              topic: groupName,
              option_a: optMap['A'] || '',
              option_b: optMap['B'] || '',
              option_c: optMap['C'] || '',
              option_d: optMap['D'] || '',
              answer: answer || '',
              difficulty: '',
              type: optMap['A'] ? 'single' : 'text',
              insert_after_topic: true,
              position: intent.position || null
            })
          });
          if (!r.ok) throw new Error();
          const data = await r.json();
          return `<div><div style="color:var(--easy);font-weight:600;margin-bottom:8px">✅ Question added to <b>${groupName}</b>!</div>${buildMcqCard(data.mcq || { question: questionText, topic: groupName }, '★')}</div>`;
        } catch {
          return `<div style="color:var(--hard)">⚠️ Failed to save question.</div>`;
        }
      }

      // Fallback: open modal
      try {
        const r = await fetch(`${BACKEND}/api/mcqs?_t=${Date.now()}`);
        const data = await r.json();
        const questions = data.mcqs || data.questions || [];
        const groups = [...new Set(questions.map(q => q.topic).filter(Boolean))];
        const detectedGroup = intent?.topic || intent?.group?.name ||
          (text ? groups.find(g => text.toLowerCase().includes(g.toLowerCase())) : null);
        let detectedPosition = null;
        if (text) {
          const afterMatch = text.match(/after\s+(?:question\s+|Q)?(\d+)/i);
          if (afterMatch) detectedPosition = parseInt(afterMatch[1]);
        }
        openAddModal();
        setTimeout(() => {
          if (detectedGroup) document.getElementById('am-topic').value = detectedGroup;
          if (detectedPosition) {
            document.getElementById('am-position-type').value = 'after';
            document.getElementById('am-position-num-wrap').style.display = 'block';
            document.getElementById('am-position-num').value = detectedPosition;
          }
        }, 200);
        return detectedGroup
          ? `<div style="color:var(--text2);font-size:12px">📝 Adding to <b>${detectedGroup}</b> — fill in the form.</div>`
          : `<div style="color:var(--text2);font-size:12px">📝 Fill in the form to add a new question.</div>`;
      } catch {
        openAddModal();
        return `<div style="color:var(--text2);font-size:12px">📝 Fill in the form to add a new question.</div>`;
      }
    }

    async function addOptionToQuestion(qNum, optValue, intent = {}) {
      try {
        const r = await fetch(`${BACKEND}/api/mcqs?_t=${Date.now()}`);
        const data = await r.json();
        const questions = data.mcqs || data.questions || [];
        // Filter by group if provided
        let pool = questions;
        const groupHint = intent.group?.name || intent.topic || null;
        if (groupHint) {
          const filtered = questions.filter(q => (q.topic || '').toLowerCase().includes(groupHint.toLowerCase()));
          if (filtered.length > 0) pool = filtered;
        }
        // Find question by its position number within the group
        const q = pool.find((item, idx) => idx + 1 === qNum) || pool[qNum - 1];
        console.log('POOL LENGTH:', pool.length, 'LOOKING FOR qNum:', qNum, 'FOUND:', pool[qNum - 1]?.question);
        if (!q) return `<div style="color:var(--hard)">⚠️ Question ${qNum} not found.</div>`;

        const optKeys = ['option_a', 'option_b', 'option_c', 'option_d'];
        const optionKey = intent.optionKey ? `option_${intent.optionKey.toLowerCase()}` : null;
        const isReplace = intent.is_replace === true;

        function isEmptyOpt(val) {
          return !val || val.trim() === '' || val.trim().toLowerCase() === 'nan';
        }

        let targetSlot;
        if (isReplace && optionKey) {
          targetSlot = optionKey;
        } else if (optionKey && isEmptyOpt(q[optionKey])) {
          targetSlot = optionKey;
        } else if (optionKey && !isEmptyOpt(q[optionKey])) {
          targetSlot = optKeys.find(k => isEmptyOpt(q[k]));
        } else {
          targetSlot = optKeys.find(k => isEmptyOpt(q[k]));
        }

        if (!targetSlot) {
          return `<div style="color:var(--hard)">⚠️ Q${qNum} already has 4 options (A, B, C, D). Use "replace" to overwrite an existing option.</div>`;
        }

        const oldValue = q[targetSlot];
        const label = targetSlot.replace('option_', '').toUpperCase();
        const pr = await fetch(`${BACKEND}/api/mcqs/${q.id}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ updates: { [targetSlot]: optValue } })
        });
        if (!pr.ok) throw new Error();

        if (isReplace && oldValue) {
          return `<div style="color:var(--easy);font-weight:600">✅ Replaced option <b>${label}</b> from <b>${oldValue}</b> to <b>${optValue}</b> in Q${qNum}!</div>`;
        }
        return `<div style="color:var(--easy);font-weight:600">✅ Added option <b>${label}: ${optValue}</b> to Q${qNum} — <b>${q.question}</b></div>`;
      } catch {
        return `<div style="color:var(--hard)">⚠️ Failed to add option.</div>`;
      }
    }
