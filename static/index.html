<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SDM Manager App</title>
  <style>
    @font-face {
      font-family: 'Inter';
      font-weight: 300;
      src: url('/static/fonts/Inter-300.ttf');
    }

    @font-face {
      font-family: 'Inter';
      font-weight: 400;
      src: url('/static/fonts/Inter-400.ttf');
    }

    @font-face {
      font-family: 'Inter';
      font-weight: 500;
      src: url('/static/fonts/Inter-500.ttf');
    }

    @font-face {
      font-family: 'Inter';
      font-weight: 600;
      src: url('/static/fonts/Inter-600.ttf');
    }

    @font-face {
      font-family: 'Inter';
      font-weight: 700;
      src: url('/static/fonts/Inter-700.ttf');
    }

    @font-face {
      font-family: 'JetBrains Mono';
      font-weight: 300;
      src: url('/static/fonts/JetBrainsMono-300.ttf');
    }

    @font-face {
      font-family: 'JetBrains Mono';
      font-weight: 400;
      src: url('/static/fonts/JetBrainsMono-400.ttf');
    }

    @font-face {
      font-family: 'JetBrains Mono';
      font-weight: 500;
      src: url('/static/fonts/JetBrainsMono-500.ttf');
    }
  </style>
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #171717;
      --surface2: #1e1e1e;
      --surface3: #262626;
      --border: #2e2e2e;
      --border2: #3a3a3a;
      --accent: #a78bfa;
      --accent-hover: #c4b5fd;
      --text: #ececec;
      --text2: #a3a3a3;
      --text3: #525252;
      --easy: #34d399;
      --medium: #fb923c;
      --hard: #f87171;
      --sidebar-w: 56px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
    }

    /* LOGIN */
    #login-screen {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 36px;
      width: 400px;
    }

    .login-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 4px;
      color: var(--text);
    }

    .login-sub {
      color: var(--text3);
      font-size: 13px;
      margin-bottom: 28px;
      font-family: 'JetBrains Mono', monospace;
    }

    .tab-row {
      display: flex;
      margin-bottom: 24px;
      background: var(--surface2);
      border-radius: 8px;
      padding: 3px;
      gap: 3px;
    }

    .tab-btn {
      flex: 1;
      padding: 9px;
      border: none;
      background: transparent;
      color: var(--text2);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      border-radius: 6px;
      cursor: pointer;
      transition: all .15s;
    }

    .tab-btn.active {
      background: var(--surface3);
      color: var(--text);
    }

    .form-group {
      margin-bottom: 14px;
    }

    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--text3);
      margin-bottom: 6px;
      letter-spacing: .5px;
      text-transform: uppercase;
    }

    .form-group input {
      width: 100%;
      padding: 10px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color .15s;
    }

    .form-group input:focus {
      border-color: var(--border2);
    }

    .login-btn {
      width: 100%;
      padding: 12px;
      background: var(--surface3);
      border: 1px solid var(--border2);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
      margin-top: 4px;
    }

    .login-btn:hover {
      background: var(--border2);
    }

    .login-err {
      color: var(--hard);
      font-size: 12px;
      margin-top: 8px;
      text-align: center;
      display: none;
    }

    /* MAIN LAYOUT */
    #app {
      display: flex;
      width: 100%;
      height: 100vh;
    }

    /* SIDEBAR */
    .sidebar {
      width: var(--sidebar-w);
      height: 100vh;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px 0;
      flex-shrink: 0;
      z-index: 100;
    }

    .sidebar-divider {
      width: 32px;
      height: 1px;
      background: var(--border);
      margin: 6px 0;
    }

    .sidebar-btn {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      color: var(--text3);
      cursor: pointer;
      transition: all .15s;
      margin: 2px 0;
      position: relative;
    }

    .sidebar-btn:hover {
      background: var(--surface2);
      color: var(--text2);
    }

    .sidebar-btn.active {
      background: var(--surface3);
      color: var(--text);
    }

    .sidebar-btn svg {
      width: 18px;
      height: 18px;
    }

    .sidebar-bottom {
      margin-top: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .avatar-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--surface3);
      border: 1px solid var(--border2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 13px;
      color: var(--text2);
    }

    .sidebar-btn::after {
      content: attr(data-tip);
      position: absolute;
      left: calc(100% + 8px);
      top: 50%;
      transform: translateY(-50%);
      background: var(--surface3);
      color: var(--text);
      font-size: 11px;
      font-weight: 500;
      padding: 4px 8px;
      border-radius: 6px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity .15s;
      font-family: 'Inter', sans-serif;
      border: 1px solid var(--border);
    }

    .sidebar-btn:hover::after {
      opacity: 1;
    }

    /* HISTORY PANEL */
    #history-panel {
      width: 0;
      overflow: hidden;
      background: var(--surface);
      border-right: 1px solid var(--border);
      transition: width .25s ease;
      flex-shrink: 0;
    }

    #history-panel.open {
      width: 220px;
    }

    #saved-panel {
      width: 0;
      overflow: hidden;
      background: var(--surface);
      border-right: 1px solid var(--border);
      transition: width .25s ease;
      flex-shrink: 0;
    }

    #saved-panel.open {
      width: 280px;
    }

    .history-inner {
      width: 220px;
      padding: 16px 12px;
      height: 100%;
      overflow-y: auto;
    }

    .history-title {
      font-size: 10px;
      font-weight: 600;
      color: var(--text3);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 10px;
      padding: 0 4px;
    }

    .history-item {
      padding: 8px 10px;
      border-radius: 6px;
      cursor: pointer;
      color: var(--text2);
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: all .15s;
      margin-bottom: 2px;
    }

    .history-item:hover {
      background: var(--surface2);
      color: var(--text);
    }

    .history-item.active {
      background: var(--surface2);
      color: var(--text);
    }

    /* MAIN */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .topbar {
      height: 48px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      border-bottom: 1px solid var(--border);
      gap: 10px;
      background: var(--surface);
      flex-shrink: 0;
    }

    .topbar-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    .topbar-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .welcome-text {
      font-size: 12px;
      color: var(--text3);
      font-weight: 400;
    }

    .welcome-text span {
      color: var(--text2);
      font-weight: 500;
    }

    /* CHAT */
    .chat-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      scroll-behavior: smooth;
    }

    .chat-wrap::-webkit-scrollbar {
      width: 4px;
    }

    .chat-wrap::-webkit-scrollbar-track {
      background: transparent;
    }

    .chat-wrap::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    .msg-row {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      max-width: 760px;
      margin-left: auto;
      margin-right: auto;
    }

    .msg-row.user {
      flex-direction: row-reverse;
    }

    .msg-avatar {
      width: 30px;
      height: 30px;
      border-radius: 6px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
    }

    .msg-row.bot .msg-avatar {
      background: var(--surface3);
      color: var(--text2);
    }

    .msg-row.user .msg-avatar {
      background: var(--surface3);
      color: var(--text2);
    }

    .msg-bubble {
      max-width: calc(100% - 40px);
      padding: 10px 14px;
      border-radius: 10px;
      line-height: 1.6;
      font-size: 13px;
    }

    .msg-row.bot .msg-bubble {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-top-left-radius: 3px;
      color: var(--text);
    }

    .msg-row.user .msg-bubble {
      background: var(--surface3);
      border: 1px solid var(--border2);
      border-top-right-radius: 3px;
      color: var(--text);
    }

    /* MCQ CARD */
    .mcq-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      margin: 6px 0;
    }

    .mcq-header {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 10px;
    }

    .mcq-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text3);
      font-weight: 500;
      margin-top: 2px;
      flex-shrink: 0;
    }

    .mcq-q {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      line-height: 1.5;
      flex: 1;
    }

    .diff-badge {
      font-size: 9px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 20px;
      font-family: 'JetBrains Mono', monospace;
      flex-shrink: 0;
    }

    .diff-badge.easy {
      background: rgba(52, 211, 153, .1);
      color: var(--easy);
      border: 1px solid rgba(52, 211, 153, .2);
    }

    .diff-badge.medium {
      background: rgba(251, 146, 60, .1);
      color: var(--medium);
      border: 1px solid rgba(251, 146, 60, .2);
    }

    .diff-badge.hard {
      background: rgba(248, 113, 113, .1);
      color: var(--hard);
      border: 1px solid rgba(248, 113, 113, .2);
    }

    .mcq-options {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .mcq-opt {
      padding: 7px 10px;
      border-radius: 6px;
      font-size: 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .mcq-opt.correct {
      background: rgba(52, 211, 153, .08);
      border-color: rgba(52, 211, 153, .3);
      color: var(--easy);
    }

    .opt-key {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      font-size: 11px;
      color: var(--text3);
      flex-shrink: 0;
    }

    .mcq-opt.correct .opt-key {
      color: var(--easy);
    }

    /* EXPORT BUTTONS */
    .export-btn-inline {
      padding: 7px 14px;
      border-radius: 7px;
      border: none;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 500;
      transition: all .15s;
    }

    .export-btn-inline.xlsx {
      background: rgba(52, 211, 153, .1);
      color: var(--easy);
      border: 1px solid rgba(52, 211, 153, .2);
    }

    .export-btn-inline.xlsx:hover {
      background: rgba(52, 211, 153, .2);
    }

    .export-btn-inline.pdf {
      background: rgba(248, 113, 113, .1);
      color: var(--hard);
      border: 1px solid rgba(248, 113, 113, .2);
    }

    .export-btn-inline.pdf:hover {
      background: rgba(248, 113, 113, .2);
    }

    .export-btn-inline.docx {
      background: rgba(167, 139, 250, .1);
      color: var(--accent);
      border: 1px solid rgba(167, 139, 250, .2);
    }

    .export-btn-inline.docx:hover {
      background: rgba(167, 139, 250, .2);
    }

    /* TYPING */
    .typing-dots {
      display: flex;
      gap: 3px;
      align-items: center;
      padding: 4px 0;
    }

    .typing-dots span {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--text3);
      animation: tdot 1.2s ease-in-out infinite;
    }

    .typing-dots span:nth-child(2) {
      animation-delay: .2s;
    }

    .typing-dots span:nth-child(3) {
      animation-delay: .4s;
    }

    @keyframes tdot {

      0%,
      60%,
      100% {
        transform: translateY(0);
        opacity: .4;
      }

      30% {
        transform: translateY(-3px);
        opacity: 1;
      }
    }

    /* INPUT AREA */
    .input-area {
      border-top: 1px solid var(--border);
      background: var(--surface);
      padding: 12px 16px;
      flex-shrink: 0;
    }

    #file-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 8px;
    }

    .file-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 8px;
      font-size: 12px;
    }

    .file-chip-icon {
      font-size: 13px;
    }

    .file-chip-name {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text);
    }

    .file-chip-size {
      font-size: 10px;
      color: var(--text3);
    }

    .file-chip-status {
      font-size: 10px;
      color: var(--easy);
      font-weight: 500;
    }

    .file-chip-x {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: none;
      background: transparent;
      color: var(--text3);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      transition: all .15s;
      flex-shrink: 0;
    }

    .file-chip-x:hover {
      background: rgba(248, 113, 113, .15);
      color: var(--hard);
    }

    .input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    .attach-btn {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      flex-shrink: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text3);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .15s;
      position: relative;
    }

    .attach-btn:hover {
      background: var(--surface3);
      color: var(--text2);
    }

    .attach-btn svg {
      width: 16px;
      height: 16px;
    }

    .attach-popup {
      position: absolute;
      bottom: calc(100% + 6px);
      left: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 6px;
      min-width: 170px;
      display: none;
      flex-direction: column;
      gap: 2px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, .4);
    }

    .attach-popup.show {
      display: flex;
    }

    .attach-opt {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 6px;
      cursor: pointer;
      color: var(--text2);
      font-size: 12px;
      font-weight: 500;
      transition: all .15s;
    }

    .attach-opt:hover {
      background: var(--surface3);
      color: var(--text);
    }

    .model-select-inline {
      height: 36px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text2);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      padding: 0 10px;
      border-radius: 8px;
      outline: none;
      cursor: pointer;
      flex-shrink: 0;
    }

    .model-select-inline:hover {
      border-color: var(--border2);
    }

    .msg-input-wrap {
      flex: 1;
      position: relative;
    }

    #msg-input {
      width: 100%;
      resize: none;
      overflow-y: hidden;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      padding: 9px 14px;
      outline: none;
      max-height: 140px;
      transition: border-color .15s;
      line-height: 1.5;
      min-height: 36px;
    }

    #msg-input:focus {
      border-color: var(--border2);
    }

    #msg-input::placeholder {
      color: var(--text3);
    }

    .send-btn {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      flex-shrink: 0;
      background: var(--surface3);
      border: 1px solid var(--border2);
      color: var(--text2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .15s;
    }

    .send-btn:hover {
      background: var(--border2);
      color: var(--text);
    }

    .send-btn:disabled {
      background: var(--surface2);
      color: var(--text3);
      cursor: not-allowed;
    }

    .send-btn svg {
      width: 15px;
      height: 15px;
    }

    /* EMPTY STATE */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 12px;
    }

    .empty-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text2);
    }

    .empty-sub {
      font-size: 12px;
      color: var(--text3);
      font-family: 'JetBrains Mono', monospace;
      text-align: center;
      line-height: 1.7;
    }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
      margin-top: 6px;
    }

    .suggestion-chip {
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text2);
      cursor: pointer;
      transition: all .15s;
    }

    .suggestion-chip:hover {
      background: var(--surface3);
      color: var(--text);
      border-color: var(--border2);
    }

    /* EXPORT MODAL */
    #export-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 500;
      background: rgba(0, 0, 0, .6);
      align-items: center;
      justify-content: center;
    }

    #export-modal.show {
      display: flex;
    }

    .export-modal-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      width: 340px;
    }

    .export-modal-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .export-modal-sub {
      font-size: 12px;
      color: var(--text3);
      margin-bottom: 18px;
      font-family: 'JetBrains Mono', monospace;
    }

    .export-opts {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .export-opt-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: all .15s;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
    }

    .export-opt-btn:hover {
      border-color: var(--border2);
      background: var(--surface3);
    }

    .export-opt-btn .opt-icon {
      font-size: 18px;
    }

    .export-modal-close {
      margin-top: 12px;
      width: 100%;
      padding: 9px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text3);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: all .15s;
    }

    .export-modal-close:hover {
      background: var(--surface2);
      color: var(--text2);
    }

    #file-input,
    #folder-input,
    #excel-input {
      display: none;
    }

    .stop-btn {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      flex-shrink: 0;
      background: rgba(248, 113, 113, .1);
      border: 1px solid rgba(248, 113, 113, .3);
      color: var(--hard);
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      transition: all .15s;
    }

    .stop-btn:hover {
      background: rgba(248, 113, 113, .2);
    }

    .stop-btn svg {
      width: 14px;
      height: 14px;
    }

    /* EDIT ICON ON CARD */
    .edit-icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 13px;
      padding: 2px 6px;
      border-radius: 5px;
      opacity: 0;
      transition: opacity .15s, background .15s;
      flex-shrink: 0;
      margin-left: auto;
    }

    .mcq-card:hover .edit-icon-btn {
      opacity: 1;
    }

    .edit-icon-btn:hover {
      background: var(--surface3);
    }

    /* PRACTICE MODE */
    .practice-opt {
      cursor: pointer;
      transition: background .15s, border-color .15s;
    }

    .practice-opt:hover {
      background: var(--surface3) !important;
      border-color: var(--border2) !important;
    }

    /* TOPIC FILTER BUTTONS */
    .topic-filter-btn {
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text2);
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all .15s;
    }

    .topic-filter-btn:hover {
      background: var(--surface3);
      color: var(--text);
    }

    .topic-filter-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    /* EDIT MODAL & ADD MODAL */
    #edit-modal,
    #add-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 600;
      background: rgba(0, 0, 0, .65);
      align-items: center;
      justify-content: center;
    }

    #edit-modal.show,
    #add-modal.show {
      display: flex;
    }

    .em-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      width: 460px;
      max-height: 85vh;
      overflow-y: auto;
    }

    .em-card::-webkit-scrollbar {
      width: 4px;
    }

    .em-card::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    .em-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--text);
    }

    .em-group {
      margin-bottom: 12px;
    }

    .em-group label {
      display: block;
      font-size: 10px;
      font-weight: 600;
      color: var(--text3);
      letter-spacing: .5px;
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    .em-group input,
    .em-group select,
    .em-group textarea {
      width: 100%;
      padding: 8px 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      outline: none;
      transition: border-color .15s;
      resize: vertical;
    }

    .em-group input:focus,
    .em-group select:focus,
    .em-group textarea:focus {
      border-color: var(--accent);
    }

    .em-group select option {
      background: var(--surface2);
    }

    .em-row {
      display: flex;
      gap: 10px;
    }

    .em-row .em-group {
      flex: 1;
    }

    .em-actions {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }

    .em-save {
      flex: 1;
      padding: 10px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }

    .em-save:hover {
      background: var(--accent-hover);
      color: #000;
    }

    .em-cancel {
      padding: 10px 18px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text2);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: all .15s;
    }

    .em-cancel:hover {
      background: var(--surface3);
    }

    /* SQ FLOW BUTTONS */
    .sq-btn {
      padding: 8px 18px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all .15s;
    }

    .sq-btn:hover {
      background: var(--surface3);
      border-color: var(--border2);
    }

    .sq-btn-easy {
      border-color: rgba(52, 211, 153, .3);
      color: var(--easy);
      background: rgba(52, 211, 153, .08);
    }

    .sq-btn-easy:hover {
      background: rgba(52, 211, 153, .15);
    }

    .sq-btn-medium {
      border-color: rgba(251, 146, 60, .3);
      color: var(--medium);
      background: rgba(251, 146, 60, .08);
    }

    .sq-btn-medium:hover {
      background: rgba(251, 146, 60, .15);
    }

    .sq-btn-hard {
      border-color: rgba(248, 113, 113, .3);
      color: var(--hard);
      background: rgba(248, 113, 113, .08);
    }

    .sq-btn-hard:hover {
      background: rgba(248, 113, 113, .15);
    }

    /* PRACTICE CARD ACTIONS */
    .practice-card-actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      align-items: center;
    }

    .show-answer-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 5px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text2);
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all .15s;
    }

    .show-answer-btn:hover {
      background: var(--surface3);
      color: var(--text);
    }

    .done-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text3);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: all .15s;
      flex-shrink: 0;
    }

    .done-btn:hover {
      background: rgba(52, 211, 153, .1);
      border-color: rgba(52, 211, 153, .3);
      color: var(--easy);
    }

    .done-btn.done {
      background: rgba(52, 211, 153, .15);
      border-color: rgba(52, 211, 153, .4);
      color: var(--easy);
    }

    .answer-reveal {
      margin-top: 6px;
      padding: 7px 12px;
      background: rgba(52, 211, 153, .08);
      border: 1px solid rgba(52, 211, 153, .2);
      border-radius: 6px;
      font-size: 12px;
      color: var(--easy);
      font-weight: 600;
      display: none;
    }

    .sdm-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      grid-auto-rows: auto;
    }

    .sdm-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: border-color .2s;
      overflow: hidden;
      height: auto !important;
      max-height: none !important;
      min-height: 200px !important;
    }

    .sdm-card:hover {
      border-color: var(--border2);
    }

    .sdm-card .sdm-input-area {
      flex: 1;
    }

    .sdm-card .sdm-footer {
      margin-top: auto;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sdm-card .sdm-footer {
      margin-top: auto;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* GROUP FLOW NAVIGATION */
    .flow-nav {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .flow-btn {
      padding: 9px 22px;
      border-radius: 20px;
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all .18s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .flow-btn-next {
      background: var(--accent);
      color: #fff;
    }

    .flow-btn-next:hover {
      background: var(--accent-hover);
      color: #000;
    }

    .flow-btn-back {
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--text2);
    }

    .flow-btn-back:hover {
      background: var(--surface3);
      color: var(--text);
    }

    .flow-btn-confirm {
      background: var(--easy);
      color: #000;
    }

    .flow-btn-confirm:hover {
      background: #6ee7b7;
    }

    .flow-progress {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .flow-progress-step {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text3);
    }

    .flow-progress-step.active {
      color: var(--accent);
    }

    .flow-progress-step.done {
      color: var(--easy);
    }

    .flow-progress-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border2);
      flex-shrink: 0;
    }

    .flow-progress-step.active .flow-progress-dot {
      background: var(--accent);
    }

    .flow-progress-step.done .flow-progress-dot {
      background: var(--easy);
    }

    .flow-progress-line {
      width: 18px;
      height: 1px;
      background: var(--border);
      flex-shrink: 0;
    }

    .flow-error {
      padding: 8px 14px;
      background: rgba(248, 113, 113, .1);
      border: 1px solid rgba(248, 113, 113, .25);
      border-radius: 8px;
      font-size: 12px;
      color: var(--hard);
      font-weight: 500;
      margin-top: 10px;
      display: none;
    }

    #convert-panel {
      width: 0;
      overflow: hidden;
      background: var(--surface);
      border-right: 1px solid var(--border);
      transition: width .25s ease;
      flex-shrink: 0;
    }

    #convert-panel.open {
      width: 300px;
    }
  </style>
</head>

<body>
  <!-- LOGIN -->
  <div id="login-screen" style="display: none;">
    <div class="login-card">
      <div class="login-title">SDM Manager</div>
      <div class="tab-row">
        <button class="tab-btn active" onclick="switchTab('login')">Login</button>
        <button class="tab-btn" onclick="switchTab('signup')">Sign Up</button>
      </div>
      <div id="login-form">
        <div class="form-group"><label>Username</label><input type="text" id="l-user" placeholder="Enter username" />
        </div>
        <div class="form-group"><label>Password</label><input type="password" id="l-pass"
            placeholder="Enter password" /></div>
        <button class="login-btn" onclick="doLogin()">Login →</button>
      </div>
      <div id="signup-form" style="display:none">
        <div class="form-group"><label>Full Name</label><input type="text" id="s-name" placeholder="Your name" /></div>
        <div class="form-group"><label>Username</label><input type="text" id="s-user" placeholder="Choose username" />
        </div>
        <div class="form-group"><label>Password</label><input type="password" id="s-pass"
            placeholder="Choose password" /></div>
        <button class="login-btn" onclick="doSignup()">Create Account →</button>
      </div>
      <div class="login-err" id="auth-err"></div>
    </div>
  </div>

  <!-- EDIT MODAL -->
  <div id="edit-modal">
    <div class="em-card">
      <div class="em-title">✏️ Edit Question</div>
      <input type="hidden" id="em-id">
      <div class="em-group">
        <label>Question Type</label>
        <select id="em-type" onchange="handleEditTypeChange(this.value)">
          <option value="single">Single Choice</option>
          <option value="multi">Multi Choice</option>
          <option value="boolean">Boolean (True/False)</option>
          <option value="number">Number</option>
          <option value="char">Character</option>
        </select>
      </div>
      <div class="em-group">
        <label>Question</label>
        <textarea id="em-question" rows="3"></textarea>
      </div>
      <div id="em-options-area"></div>
      <div class="em-row">
        <div class="em-group" id="em-answer-group">
          <label>Correct Answer</label>
          <select id="em-answer"></select>
        </div>
        <div class="em-group">
          <label>Difficulty</label>
          <select id="em-difficulty">
            <option>No Difficulty</option>
            <option>Easy</option>
            <option>Medium</option>
            <option>Hard</option>
          </select>
        </div>
      </div>
      <div class="em-group"><label>Topic</label><input id="em-topic" type="text"></div>
      <div class="em-actions">
        <button class="em-save" onclick="saveEditModal()">Save Changes</button>
        <button class="em-cancel" onclick="closeEditModal()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- ADD QUESTION MODAL -->
  <div id="add-modal">
    <div class="em-card">
      <div class="em-title">➕ Add New Question</div>
      <div class="em-group">
        <label>Question Type</label>
        <select id="am-type" onchange="handleAddTypeChange(this.value)">
          <option value="single">Single Choice</option>
          <option value="multi">Multi Choice</option>
          <option value="boolean">Boolean (True/False)</option>
          <option value="number">Number</option>
          <option value="char">Character</option>
        </select>
      </div>
      <div class="em-group">
        <label>Question</label>
        <textarea id="am-question" rows="3" placeholder="Enter question text..."></textarea>
      </div>

      <!-- Dynamic options area -->
      <div id="am-options-area"></div>

      <div class="em-row">
        <div class="em-group" id="am-answer-group">
          <label>Correct Answer</label>
          <select id="am-answer"></select>
        </div>
        <div class="em-group">
          <label>Difficulty</label>
          <select id="am-difficulty">
            <option value="">No Difficulty</option>
            <option>Easy</option>
            <option>Medium</option>
            <option>Hard</option>
          </select>
        </div>
      </div>
      <div class="em-group"><label>Topic</label><input id="am-topic" type="text" placeholder="e.g. Python, Java...">
      </div>
      <div class="em-group">
        <label>Position (optional)</label>
        <select id="am-position-type" onchange="handlePositionTypeChange(this.value)"
          style="width:100%;padding:8px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:Inter,sans-serif;font-size:13px;outline:none">
          <option value="last">Add at End (default)</option>
          <option value="first">Add at Beginning</option>
          <option value="after">After Question Number</option>
        </select>
        <div id="am-position-num-wrap" style="display:none;margin-top:6px">
          <input id="am-position-num" type="number" min="1" placeholder="e.g. 5 (adds after question 5)"
            style="width:100%;padding:8px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:Inter,sans-serif;font-size:13px;outline:none">
        </div>
      </div>
      <div id="am-success-msg"
        style="display:none;padding:8px 12px;background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.2);border-radius:7px;font-size:12px;color:var(--easy);font-weight:600;margin-bottom:8px">
      </div>
      <div class="em-actions">
        <button class="em-save" onclick="saveAddModal()">Add Question</button>
        <button class="em-save" style="background:var(--surface3);border:1px solid var(--border2);color:var(--text2)"
          onclick="closeAddModal()">Done</button>
        <button class="em-cancel" onclick="cancelAddModal()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- APP -->
  <div id="app" style="display:none">
    <div class="sidebar">
      <div class="sidebar-divider"></div>
      <button class="sidebar-btn" data-tip="New Chat" onclick="newChat()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="12" y1="5" x2="12" y2="19" />
          <line x1="5" y1="12" x2="19" y2="12" />
        </svg>
      </button>
      <button class="sidebar-btn" id="history-toggle-btn" data-tip="Chat History" onclick="toggleHistory()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
        </svg>
      </button>
      <!-- <button class="sidebar-btn" data-tip="Library">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
        </svg>
      </button> -->
      <button class="sidebar-btn" data-tip="View JSON Data" onclick="openJsonView()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="16 18 22 12 16 6" />
          <polyline points="8 6 2 12 8 18" />
        </svg>
      </button>
      <!-- <button class="sidebar-btn" data-tip="Search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
      </button> -->
      <div class="sidebar-divider"></div>
      <button class="sidebar-btn" data-tip="Export Chat" onclick="exportChat()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="8 17 12 21 16 17" />
          <line x1="12" y1="12" x2="12" y2="21" />
          <path d="M20.88 18.09A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.29" />
        </svg>
      </button>
      <button class="sidebar-btn" data-tip="Download Questions" onclick="showExportModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
          <polyline points="7 10 12 15 17 10" />
          <line x1="12" y1="15" x2="12" y2="3" />
        </svg>
      </button>
      <button class="sidebar-btn" data-tip="Saved Responses" onclick="toggleSavedPanel()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
          <polyline points="17 21 17 13 7 13 7 21" />
          <polyline points="7 3 7 8 15 8" />
        </svg>
      </button>
      <button class="sidebar-btn" id="convert-toggle-btn" data-tip="Convert CSV to SDM" onclick="toggleConvertPanel()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="17 1 21 5 17 9" />
          <path d="M3 11V9a4 4 0 0 1 4-4h14" />
          <polyline points="7 23 3 19 7 15" />
          <path d="M21 13v2a4 4 0 0 1-4 4H3" />
        </svg>
      </button>
      <div class="sidebar-bottom">
        <button class="sidebar-btn" data-tip="Settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3" />
            <path
              d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
          </svg>
        </button>
        <button class="avatar-btn" id="avatar-btn" data-tip="Logout" onclick="doLogout()">U</button>
      </div>
    </div>

    <div id="history-panel">
      <div class="history-inner">
        <div class="history-title">History</div>
        <div id="history-list"></div>
      </div>
    </div>
    <!-- SAVED RESPONSES PANEL -->
    <div id="saved-panel">
      <div style="width:280px;padding:16px 12px;height:100%;overflow-y:auto;">
        <div class="history-title">Saved Responses</div>
        <div id="saved-responses-list">
          <div style="color:var(--text3);font-size:12px;padding:4px">No saved responses yet.</div>
        </div>
      </div>
    </div>
    <!-- CONVERT PANEL -->
    <div id="convert-panel">
      <div
        style="width:300px;padding:16px 14px;height:100%;overflow-y:auto;display:flex;flex-direction:column;gap:12px">
        <div class="history-title">Convert CSV → SDM</div>

        <div id="convert-drop-zone" onclick="document.getElementById('convert-csv-input').click()"
          style="border:2px dashed var(--border2);border-radius:10px;padding:28px 16px;text-align:center;cursor:pointer;transition:border-color .15s"
          onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border2)'">
          <div style="font-size:24px;margin-bottom:8px">📄</div>
          <div style="font-size:12px;font-weight:600;color:var(--text2)">Click to upload CSV</div>
          <div style="font-size:11px;color:var(--text3);margin-top:4px">Only .csv files supported</div>
        </div>

        <div id="convert-file-info"
          style="display:none;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;font-size:12px">
          <div style="font-weight:600;color:var(--text)" id="convert-file-name"></div>
          <div style="color:var(--text3);margin-top:2px" id="convert-file-size"></div>
        </div>

        <button id="convert-btn" onclick="runPanelConvert()"
          style="display:none;width:100%;padding:11px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-family:Inter,sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:background .15s"
          onmouseover="this.style.background='var(--accent-hover)';this.style.color='#000'"
          onmouseout="this.style.background='var(--accent)';this.style.color='#fff'">
          ⚡ Convert to SDM
        </button>

        <div id="convert-status" style="display:none"></div>

        <button id="convert-download-btn" onclick="downloadPanelSDM()"
          style="display:none;width:100%;padding:11px;background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.2);border-radius:8px;color:var(--easy);font-family:Inter,sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s"
          onmouseover="this.style.background='rgba(52,211,153,.2)'"
          onmouseout="this.style.background='rgba(52,211,153,.1)'">
          📥 Download SDM File
        </button>

        <div id="convert-history-section" style="margin-top:8px">
          <div
            style="font-size:10px;font-weight:600;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px">
            Conversion History</div>
          <div id="convert-history-list"></div>

              <line x1="12" y1="5" x2="12" y2="19" />

            <div class="attach-popup" id="attach-popup">
              <div class="attach-opt" onclick="triggerFileInput()">📄 Upload File</div>
              <div class="attach-opt" onclick="triggerFolderInput()">📁 Upload Folder</div>
              <div class="attach-opt" onclick="triggerExcelInput()">📊 Import Excel/CSV</div>

            <option value="sdm-intent">SDM-Model</option>

              oninput="autoResize(this)"></textarea>

            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="22" y1="2" x2="11" y2="13" />
              <polygon points="22 2 15 22 11 13 2 9 22 2" />
            </svg>
          </button>
          <button class="stop-btn" id="stop-btn" onclick="stopRequest()">

              <rect x="4" y="4" width="16" height="16" rx="2" />

  <!-- EXPORT MODAL -->
  <div id="export-modal">
    <div class="export-modal-card">
      <div class="export-modal-title">Download Questions</div>
      <div class="export-modal-sub">// choose format</div>

        <button class="export-opt-btn" onclick="doExport('xlsx')"><span class="opt-icon">📊</span>
          <div>
            <div>Excel (.xlsx)</div>
            <div style="font-size:11px;color:var(--text3);font-weight:400;margin-top:2px">Spreadsheet with all MCQs
            </div>
          </div>

        <button class="export-opt-btn" onclick="doExport('pdf')"><span class="opt-icon">📄</span>
          <div>
            <div>PDF Document</div>

            <div>Word Document(.docx)</div>

  <input type="file" id="file-input" accept=".json,.csv,.xlsx,.xls,.txt,.pdf" onchange="handleFileUpload(event)" />
  <input type="file" id="folder-input" webkitdirectory onchange="handleFolderUpload(event)" />
  <input type="file" id="excel-input" accept=".xlsx,.xls,.csv" onchange="handleFileUpload(event)" />


  <script>
    const BACKEND = '';
    function openJsonView() {
      if (!activeWorkingFile) {
        const win = window.open('', '_blank');
        win.document.write('<pre style="font-family:monospace;padding:20px;background:#0d0d0d;color:#a3a3a3;height:100vh;margin:0">No file active in this chat.</pre>');
        return;
      }
      window.open(`${BACKEND}/api/mcqs?filename=${encodeURIComponent(activeWorkingFile)}`, '_blank');
    }
    let currentUser = null, chatSessions = [], activeChatId = null, pendingFiles = [], isStreaming = false,
      pendingQuestion = null, pendingDownload = null, pendingDelete = null, pendingEdit = null,
      pendingFileSelect = null, abortController = null, activeWorkingFile = null;

    function getActiveSession() {
      return chatSessions.find(s => s.id === activeChatId);
    }

    window.onload = async () => {
      try {
        const res = await fetch('/api/me');
        if (!res.ok) {
          window.location.href = '/login';
          return;
        }
        currentUser = await res.json();
        await loadHistory();
        enterApp();
      } catch (e) {
        window.location.href = '/login';
      }
    };

    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'signup')));
      document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('signup-form').style.display = tab === 'signup' ? 'block' : 'none';
      document.getElementById('auth-err').style.display = 'none';
    }

    async function doLogin() {
      const username = document.getElementById('l-user').value.trim();
      const password = document.getElementById('l-pass').value;
      if (!username || !password) return showAuthErr('Fill all fields');
      try {
        const r = await fetch(`${BACKEND}/api/auth/login`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
        if (!r.ok) { const d = await r.json(); return showAuthErr(d.detail || 'Login failed'); }
        const user = await r.json(); currentUser = user; localStorage.setItem('mcq_user', JSON.stringify(user)); enterApp();
      } catch {
        const stored = JSON.parse(localStorage.getItem('mcq_users') || '{}');
        if (stored[username] && stored[username].password === btoa(password)) { currentUser = { name: stored[username].name, username }; localStorage.setItem('mcq_user', JSON.stringify(currentUser)); enterApp(); }
        else showAuthErr('Cannot connect to backend');
      }
    }

    async function doSignup() {
      const name = document.getElementById('s-name').value.trim();
      const username = document.getElementById('s-user').value.trim();
      const password = document.getElementById('s-pass').value;
      if (!name || !username || !password) return showAuthErr('Fill all fields');
      try {
        const r = await fetch(`${BACKEND}/api/auth/signup`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name, username, password }) });
        if (!r.ok) { const d = await r.json(); return showAuthErr(d.detail || 'Signup failed'); }
        const user = await r.json(); currentUser = user; localStorage.setItem('mcq_user', JSON.stringify(user)); enterApp();
      } catch {
        const stored = JSON.parse(localStorage.getItem('mcq_users') || '{}');
        if (stored[username]) return showAuthErr('Username already taken');
        stored[username] = { name, password: btoa(password) }; localStorage.setItem('mcq_users', JSON.stringify(stored));
        currentUser = { name, username }; localStorage.setItem('mcq_user', JSON.stringify(currentUser)); enterApp();
      }
    }

    function showAuthErr(msg) { const el = document.getElementById('auth-err'); el.textContent = msg; el.style.display = 'block'; }
    function doLogout() { if (!confirm('Logout?')) return; window.location.href = '/logout'; }

    async function loadActiveFileChip() {
      try {
        const r = await fetch(`${BACKEND}/api/files/active`);
        if (!r.ok) return;
        const data = await r.json();
        const filename = data.filename || data.active;
        if (!filename) return;
        let count = 0;
        try {
          const sr = await fetch(`${BACKEND}/api/files/stats`);
          if (sr.ok) {
            const stats = await sr.json();
            const files = Array.isArray(stats) ? stats : [stats];
            const match = files.find(f => f.filename === filename);
            if (match) count = match.total || match.count || 0;
          }
        } catch { }
        const fi = { name: filename, size: count * 100, status: 'uploaded', context: null };
        pendingFiles = [fi];
        renderFileChips();
      } catch { }
    }

    async function enterApp() {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
      document.getElementById('welcome-name').textContent = currentUser.name;
      document.getElementById('avatar-btn').textContent = currentUser.name.charAt(0).toUpperCase();
      pendingFiles = [];
      document.getElementById('file-chips').innerHTML = '';

      const lastActiveChatId = localStorage.getItem('last_active_chat');
      const lastChat = chatSessions.find(s => s.id === lastActiveChatId);

      if (lastChat && lastChat.messages.length > 0) {
        // Page refresh — restore last active chat
        activeChatId = lastChat.id;
        activeWorkingFile = lastChat.activeWorkingFile || null;
        renderChat();
        renderHistory();
      } else {
        // Server restart or new session — show new chat
        const id = 'chat_' + Date.now();
        chatSessions.unshift({ id, title: 'New Chat', messages: [], fileContext: null });
        activeChatId = id;
        activeWorkingFile = null;
        localStorage.removeItem('activeWorkingFile');
        renderChat();
        renderHistory();
      }
    }

    function newChat() {
      const id = 'chat_' + Date.now();
      chatSessions.unshift({ id, title: 'New Chat', messages: [], fileContext: null });
      activeChatId = id;
      pendingFiles = [];
      activeWorkingFile = null;
      localStorage.removeItem('activeWorkingFile');
      document.getElementById('file-chips').innerHTML = '';
      renderChat();
      renderHistory();
    }

    async function loadHistory() {
      if (!currentUser) return;
      try {
        const r = await fetch(`${BACKEND}/api/chats?username=${currentUser.username}`);
        if (r.ok) { const data = await r.json(); chatSessions = data.chats || []; }
        else { const saved = localStorage.getItem('mcq_chats'); if (saved) chatSessions = JSON.parse(saved); }
      } catch { const saved = localStorage.getItem('mcq_chats'); if (saved) chatSessions = JSON.parse(saved); }
    }

    async function saveHistory() {
      const currentSession = getActiveSession();
      if (currentSession && activeWorkingFile) {
        currentSession.activeWorkingFile = activeWorkingFile;
      }
      if (!currentUser) return;
      if (!chatSessions.length) return;
      if (chatSessions.length === 1 &&
        chatSessions[0].messages.length === 0 &&
        chatSessions[0].title === 'New Chat') return;

      const lightweight = chatSessions.map(s => ({
        id: s.id,
        title: s.title,
        fileContext: s.fileContext,
        uploadedFiles: s.uploadedFiles || [],
        activeWorkingFile: s.activeWorkingFile || null,
        messages: (s.messages || []).map(m => ({
          role: m.role,
          content: m.content || '',
          raw: m.raw || null
        }))
      }));

      try {
        await fetch(`${BACKEND}/api/chats`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: currentUser.username, chats: lightweight })
        });
      } catch {
        localStorage.removeItem('mcq_chats');
        localStorage.setItem('mcq_chats', JSON.stringify(lightweight));
      }
    }
    let _panelCsvFile = null;
    let _panelConvertedSDM = null;
    let _panelConvertedFilename = null;

    function toggleConvertPanel() {
      const panel = document.getElementById('convert-panel');
      const isOpen = panel.classList.toggle('open');
      document.getElementById('convert-toggle-btn').classList.toggle('active', isOpen);
      if (isOpen) renderConvertHistory();
    }

    window.addEventListener('DOMContentLoaded', () => {
      if (!document.getElementById('convert-csv-input')) {
        const inp = document.createElement('input');
        inp.type = 'file'; inp.id = 'convert-csv-input'; inp.accept = '.csv'; inp.style.display = 'none';
        inp.onchange = (e) => {
          const file = e.target.files[0]; if (!file) return; e.target.value = '';
          _panelCsvFile = file;
          document.getElementById('convert-file-name').textContent = file.name;
          document.getElementById('convert-file-size').textContent = (file.size / 1024).toFixed(1) + ' KB';
          document.getElementById('convert-file-info').style.display = 'block';
          document.getElementById('convert-btn').style.display = 'block';
          document.getElementById('convert-status').style.display = 'none';
          document.getElementById('convert-download-btn').style.display = 'none';
          _panelConvertedSDM = null;
        };
        document.body.appendChild(inp);
      }
    });

    async function runPanelConvert() {
      if (!_panelCsvFile) return;
      const status = document.getElementById('convert-status');
      const btn = document.getElementById('convert-btn');
      btn.textContent = '⏳ Converting...'; btn.disabled = true;
      status.style.display = 'block';
      status.innerHTML = '<div style="color:var(--text3);font-size:12px">Converting, please wait…</div>';

      try {
        const fd = new FormData();
        fd.append('file', _panelCsvFile, _panelCsvFile.name);
        const r = await fetch(`${BACKEND}/api/convert/csv-to-sdm`, { method: 'POST', body: fd });
        if (!r.ok) { const err = await r.json().catch(() => ({})); throw new Error(err.detail || 'Conversion failed'); }
        const data = await r.json();
        _panelConvertedSDM = data.sdm;
        _panelConvertedFilename = data.filename;

        // ── Save to history ──────────────────────────────────────
        const histRes = await fetch(`${BACKEND}/api/convert/history?username=guest`);
        const histData = histRes.ok ? await histRes.json() : { history: [] };
        const history = histData.history || [];
        history.unshift({
          filename: data.filename,
          originalName: _panelCsvFile.name,
          groups: data.groups,
          questions: data.questions,
          convertedAt: new Date().toISOString(),
          sdm: data.sdm
        });
        if (history.length > 20) history.splice(20);
        await fetch(`${BACKEND}/api/convert/history`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: 'guest', history })
        });
        renderConvertHistory();
        // ─────────────────────────────────────────────────────────

        status.innerHTML = `<div style="padding:10px 12px;background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.2);border-radius:8px;font-size:12px">
      <div style="color:var(--easy);font-weight:600;margin-bottom:4px">✅ Converted!</div>
      <div style="color:var(--text2)">📄 ${data.filename}</div>
      <div style="color:var(--text3);margin-top:2px">${data.groups} groups · ${data.questions} questions</div>
    </div>`;
        document.getElementById('convert-download-btn').style.display = 'block';
      } catch (e) {
        status.innerHTML = `<div style="color:var(--hard);font-size:12px">⚠️ ${e.message}</div>`;
      }
      btn.textContent = '⚡ Convert to SDM'; btn.disabled = false;
    }

    async function renderConvertHistory() {
      const list = document.getElementById('convert-history-list');
      if (!list) return;
      const res = await fetch(`${BACKEND}/api/convert/history?username=guest`);
      const data = res.ok ? await res.json() : { history: [] };
      const history = data.history || [];
      if (!history.length) {
        list.innerHTML = '<div style="color:var(--text3);font-size:11px;padding:4px">No conversions yet.</div>';
        return;
      }
      list.innerHTML = history.map((item, i) => `
    <div style="padding:8px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;margin-bottom:6px">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:6px">
        <div style="flex:1;min-width:0">
          <div style="font-size:11px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">📄 ${item.filename}</div>
          <div style="font-size:10px;color:var(--text3);margin-top:2px">${item.groups} groups · ${item.questions} questions</div>
          <div style="font-size:10px;color:var(--text3);margin-top:1px">${new Date(item.convertedAt).toLocaleString()}</div>
        </div>
        <div style="display:flex;flex-direction:column;gap:4px;flex-shrink:0">
          <button onclick="reDownloadSDM(${i})"
            style="padding:3px 8px;background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.2);border-radius:5px;color:var(--easy);font-size:10px;font-weight:600;cursor:pointer;white-space:nowrap">
            📥 Download
          </button>
          <button onclick="reStartConversation(${i})"
            style="padding:3px 8px;background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.2);border-radius:5px;color:var(--accent);font-size:10px;font-weight:600;cursor:pointer;white-space:nowrap">
            💬 Chat
          </button>
          <button onclick="deleteConvertHistory(${i})"
            style="padding:3px 8px;background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.2);border-radius:5px;color:var(--hard);font-size:10px;font-weight:600;cursor:pointer;white-space:nowrap">
            🗑️ Delete
          </button>
        </div>
      </div>
    </div>
  `).join('');
    }

    async function reDownloadSDM(index) {
      const res = await fetch(`${BACKEND}/api/convert/history?username=guest`);
      const data = res.ok ? await res.json() : { history: [] };
      const item = (data.history || [])[index];
      if (!item) return;
      const blob = new Blob([JSON.stringify(item.sdm, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = item.filename; a.click();
      URL.revokeObjectURL(url);
    }

    async function reStartConversation(index) {
      const res = await fetch(`${BACKEND}/api/convert/history?username=guest`);
      const data = res.ok ? await res.json() : { history: [] };
      const item = (data.history || [])[index];
      if (!item) return;
      try {
        const blob = new Blob([JSON.stringify(item.sdm)], { type: 'application/json' });
        const file = new File([blob], item.filename, { type: 'application/json' });
        const fd = new FormData();
        fd.append('file', file);
        const r = await fetch(`${BACKEND}/api/files/upload`, { method: 'POST', body: fd });
        if (!r.ok) throw new Error();
        const uploadData = await r.json();
        activeWorkingFile = uploadData.filename || item.filename;
        localStorage.setItem('activeWorkingFile', activeWorkingFile);
        const session = getActiveSession();
        if (session) {
          session.activeWorkingFile = activeWorkingFile;
          if (!session.uploadedFiles) session.uploadedFiles = [];
          if (!session.uploadedFiles.find(f => f.name === activeWorkingFile))
            session.uploadedFiles.push({ name: activeWorkingFile, count: uploadData.count || 0 });
          saveHistory();
        }
        await fetch(`${BACKEND}/api/files/switch/${encodeURIComponent(activeWorkingFile)}`, { method: 'POST' });
        await loadActiveFileChip();
        toggleConvertPanel();
        addMessage('bot', '', `<div style="color:var(--easy);font-weight:600">✅ <b>${item.filename}</b> loaded from history!<br><span style="color:var(--text3);font-size:11px">Type "show all questions" to begin.</span></div>`);
      } catch {
        addMessage('bot', '', `<div style="color:var(--hard)">⚠️ Failed to load from history.</div>`);
      }
    }

    async function deleteConvertHistory(index) {
      const res = await fetch(`${BACKEND}/api/convert/history?username=guest`);
      const data = res.ok ? await res.json() : { history: [] };
      const history = data.history || [];
      history.splice(index, 1);
      await fetch(`${BACKEND}/api/convert/history`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: 'guest', history })
      });
      renderConvertHistory();
    }

    function downloadPanelSDM() {
      if (!_panelConvertedSDM) return;
      const blob = new Blob([JSON.stringify(_panelConvertedSDM, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = _panelConvertedFilename || 'converted_sdm.json'; a.click();
      URL.revokeObjectURL(url);
    }

    function toggleSavedPanel() {
      const panel = document.getElementById('saved-panel');
      const isOpen = panel.classList.toggle('open');
      if (isOpen) loadSavedResponsesPanel();
    }

    async function loadSavedResponsesPanel() {
      const list = document.getElementById('saved-responses-list');
      list.innerHTML = '<div style="color:var(--text3);font-size:12px;padding:4px">Loading...</div>';

      // Load all files from library that have saved responses
      let filesToLoad = [];
      try {
        const statsRes = await fetch(`${BACKEND}/api/files/stats`);
        if (statsRes.ok) {
          const stats = await statsRes.json();
          const files = Array.isArray(stats) ? stats : [stats];
          filesToLoad = files.map(f => f.filename).filter(Boolean);
        }
      } catch { }

      if (!filesToLoad.length) {
        list.innerHTML = '<div style="color:var(--text3);font-size:12px;padding:4px">No files in library.</div>';
        return;
      }

      let allSections = '';

      for (const filename of filesToLoad) {
        try {
          const [rRes, qRes] = await Promise.all([
            fetch(`${BACKEND}/api/sdm/responses?filename=${encodeURIComponent(filename)}`),
            fetch(`${BACKEND}/api/mcqs?filename=${encodeURIComponent(filename)}&_t=${Date.now()}`)
          ]);

          if (!rRes.ok) continue;
          const responses = await rRes.json();
          if (!Object.keys(responses).length) continue;

          const qdata = qRes.ok ? await qRes.json() : {};
          const questions = qdata.mcqs || qdata.questions || [];

          // Group by topic
          const grouped = {};
          Object.entries(responses).forEach(([itemOID, value]) => {
            const q = questions.find(q => q.explanation === itemOID);
            if (!q) return;
            const group = q.topic || 'General';
            if (!grouped[group]) grouped[group] = [];
            grouped[group].push({ question: q.question, value, itemOID });

                  📁 ${group}
                </div>
                ${items.map(item => `

                    <div style="flex:1">
                      <div style="font-size:11px;color:var(--text2);margin-bottom:3px;line-height:1.4">${item.question}</div>
                      <div style="font-size:12px;font-weight:600;color:var(--easy)">✅ ${item.value}</div>

                    <button onclick="deleteSavedResponse('${filename}','${item.itemOID}')"

    function renameChat(id) {
      const session = chatSessions.find(s => s.id === id); if (!session) return;
      const newTitle = prompt('Rename chat:', session.title);
      if (newTitle && newTitle.trim()) { session.title = newTitle.trim(); renderHistory(); saveHistory(); }
    }

    function deleteChat(id) {
      if (!confirm('Delete this chat?')) return;
      chatSessions = chatSessions.filter(s => s.id !== id);
      if (activeChatId === id) { if (chatSessions.length > 0) { activeChatId = chatSessions[0].id; renderChat(); } else newChat(); }
      renderHistory(); saveHistory();
    }

    async function loadChat(id) {
      activeChatId = id;
      pendingFiles = [];
      document.getElementById('file-chips').innerHTML = '';
      const session = chatSessions.find(s => s.id === id);
      activeWorkingFile = session?.activeWorkingFile || null;
      if (activeWorkingFile) {
        localStorage.setItem('activeWorkingFile', activeWorkingFile);
        await fetch(`${BACKEND}/api/files/switch/${encodeURIComponent(activeWorkingFile)}`, { method: 'POST' });
        await loadActiveFileChip();
      } else {
        localStorage.removeItem('activeWorkingFile');
      }
      renderChat(); renderHistory();

    function renderHistory() {
      const list = document.getElementById('history-list');
      list.innerHTML = '';

        const item = document.createElement('div');
        item.className = 'history-item' + (s.id === activeChatId ? ' active' : '');

    function renderChat() {
      const session = getActiveSession();
      if (session) localStorage.setItem('last_active_chat', session.id);
      const wrap = document.getElementById('chat-wrap'); wrap.innerHTML = '';
      if (!session || !session.messages.length) {
        wrap.innerHTML = `<div class="empty-state">
      <div class="empty-title">Welcome to SDM Manager App</div>
      <div class="empty-sub">Upload an file and start Conversation.<br>Viewing · Adding · Deleting · Exporting</div>
    </div>`; return;
      }
      const msgs = session.messages;
      msgs.forEach((m, i) => {
        appendMsgToDOM(m.role, m.content, m.raw);
      });
      wrap.scrollTop = wrap.scrollHeight;
    }

    function suggest(text) { document.getElementById('msg-input').value = text; autoResize(document.getElementById('msg-input')); sendMessage(); }

    function appendMsgToDOM(role, content, rawHtml) {
      const wrap = document.getElementById('chat-wrap');
      const empty = wrap.querySelector('.empty-state'); if (empty) empty.remove();
      const oldChips = document.getElementById('persistent-chips'); if (oldChips) oldChips.remove();
      const existingMessages = wrap.querySelectorAll('.msg-row');
      if (existingMessages.length === 0) {
        const chips = document.createElement('div'); chips.id = 'persistent-chips';
        chips.innerHTML = `<div class="suggestions">
      <span class="suggestion-chip" onclick="suggest('show all questions')">Show all questions</span>
      <span class="suggestion-chip" onclick="suggest('show all topics')">Show all topics</span>
      <span class="suggestion-chip" onclick="suggest('list out all files')">List out all files</span>
      <span class="suggestion-chip" onclick="suggest('how many questions?')">How many questions?</span>
      <span class="suggestion-chip" onclick="suggest('add a question')">Add a New question</span>
      <span class="suggestion-chip" onclick="suggest('edit a question')">Edit a question</span>
      <span class="suggestion-chip" onclick="suggest('delete a question')">Delete a question</span>
    </div><br>`;
        wrap.appendChild(chips);
      }
      const row = document.createElement('div'); row.className = `msg-row ${role}`;
      const av = document.createElement('div'); av.className = 'msg-avatar';
      av.textContent = role === 'bot' ? 'M' : currentUser ? currentUser.name.charAt(0).toUpperCase() : 'U';
      const bubble = document.createElement('div'); bubble.className = 'msg-bubble';

      bubble.innerHTML = rawHtml || escapeHtml(content);

      row.appendChild(av); row.appendChild(bubble); wrap.appendChild(row);
      wrap.scrollTop = wrap.scrollHeight; return bubble;
    }

    function escapeHtml(t) { return String(t).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>'); }

    function addMessage(role, content, rawHtml) {
      const session = getActiveSession(); if (!session) return;
      session.messages.push({ role, content, raw: rawHtml });
      if (role === 'user' && session.messages.filter(m => m.role === 'user').length === 1) {
        session.title = content.substring(0, 45) || 'Chat';
        renderHistory();
      }
      saveHistory();
      const bubble = appendMsgToDOM(role, content, rawHtml);

      if (role === 'bot' && rawHtml && rawHtml.includes('data-form-id')) {
        const allForms = document.querySelectorAll('.msg-row.bot .msg-bubble [data-form-id]');
        if (allForms.length > 1) {
          allForms.forEach((form, idx) => {
            if (idx < allForms.length - 1) {
              form.querySelectorAll('input, button, .mcq-opt, select, textarea').forEach(el => {
                el.disabled = true;
                el.style.opacity = '0.4';
                el.style.pointerEvents = 'none';
              });
              form.style.opacity = '0.55';
              form.style.filter = 'grayscale(30%)';
            }
          });
        }
      }

      return bubble;
    }
