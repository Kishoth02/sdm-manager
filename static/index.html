    async function _doExportShown(intent) {
      try {
        const fmt = intent.fmt || 'pdf';

        // Get shown questions from last bot message
        const allBubbles = document.querySelectorAll('.msg-row.bot .msg-bubble');
        let shownQuestions = [];
        for (let i = allBubbles.length - 1; i >= 0; i--) {
          const cards = allBubbles[i].querySelectorAll('.mcq-card');
          if (cards.length > 0) {
            cards.forEach(card => {
              const dataRaw = card.getAttribute('data-question');
              if (dataRaw) { try { shownQuestions.push(JSON.parse(dataRaw)); } catch { } }
            });
            break;
          }
        }

        // If shown questions found, export only those
        if (shownQuestions.length > 0) {
          const r = await fetch(`${BACKEND}/api/export/custom?fmt=${fmt}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ questions: shownQuestions })
          });
          if (!r.ok) throw new Error();
          const blob = await r.blob();
          const blobUrl = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = blobUrl;
          a.download = `mcq_questions.${fmt}`;
          a.click();
          URL.revokeObjectURL(blobUrl);
          return `<div style="color:var(--easy)">✅ Exported ${shownQuestions.length} shown questions as <strong>.${fmt}</strong>!</div>`;
        }

        // Fallback: export all
        let url = `${BACKEND}/api/export?fmt=${fmt}`;
        if (activeWorkingFile) url += `&filename=${encodeURIComponent(activeWorkingFile)}`;
        const r = await fetch(url);
        if (!r.ok) throw new Error();
        const blob = await r.blob();
        const blobUrl = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = blobUrl;
        a.download = `mcq_questions.${fmt}`;
        a.click();
        URL.revokeObjectURL(blobUrl);
        return `<div style="color:var(--easy)">✅ Exported as <strong>.${fmt}</strong>!</div>`;
      } catch {
        return `<div style="color:var(--hard)">⚠️ Export failed.</div>`;
      }
    }

    async function handleMultiTopics(intent) {
      try {
        const topics = intent.topics || [];
        if (!topics.length) return `<div style="color:var(--hard)">⚠️ No topics found in request.</div>`;

        let allCards = '';
        let totalShown = 0;
        let allShown = [];

        for (const topicObj of topics) {
          const topic = topicObj.topic;
          const count = topicObj.count ?? 1;
          const difficulty = topicObj.difficulty || null;
          const random = topicObj.random || false;

          let url = `${BACKEND}/api/mcqs?topic=${encodeURIComponent(topic)}`;
          if (activeWorkingFile) url += `&filename=${encodeURIComponent(activeWorkingFile)}`;
          if (difficulty) url += `&difficulty=${encodeURIComponent(difficulty)}`;

          const r = await fetch(url);
          const data = await r.json();
          let qs = Array.isArray(data) ? data : (data.mcqs || data.questions || []);
          qs = qs.filter(q => (q.topic || '').toLowerCase().includes(topic.toLowerCase()));

          if (!qs.length) {
            allCards += `<div style="color:var(--hard);font-size:12px;margin:4px 0">⚠️ No "${topic}" questions found</div>`;
            continue;
          }

          if (random) qs = [...qs].sort(() => Math.random() - 0.5);
          const shown = qs.slice(0, count);
          // const shown = qs.slice(0, count);
          const label = difficulty ? `${topic} — ${difficulty}` : topic;

          allCards += `<div style="font-weight:600;font-size:12px;color:var(--accent);margin:8px 0 4px">
        📁 ${label.charAt(0).toUpperCase() + label.slice(1)} (${shown.length})
      </div>`;
          allCards += shown.map((q, i) => buildMcqCard(q, i + 1)).join('');
          totalShown += shown.length;
          allShown.push(...shown);
        }

        if (!totalShown) return `<div style="color:var(--hard)">⚠️ No matching questions found.</div>`;

        window._saveCustomQuestions = allShown;

        return `<div>
      <div style="font-weight:600;margin-bottom:8px;font-size:13px">
        📚 Showing ${totalShown} questions across ${topics.length} topic${topics.length > 1 ? 's' : ''}
      </div>
      ${allCards}
      <div style="margin-top:10px;display:flex;gap:8px">
        <button class="export-btn-inline pdf" onclick="doSaveCustomFmt('pdf')">📄 Export PDF</button>
        <button class="export-btn-inline docx" onclick="doSaveCustomFmt('docx')">📝 Export Word</button>
        <button class="export-btn-inline xlsx" onclick="doSaveCustomFmt('xlsx')">📊 Export Excel</button>
      </div>
    </div>`;
      } catch (err) {
        return `<div style="color:var(--hard)">⚠️ Failed: ${err.message}</div>`;
      }
    }

    async function handleSaveCustom() {
      try {
        // Get only cards from the LAST bot message that has mcq-cards
        const allBubbles = document.querySelectorAll('.msg-row.bot .msg-bubble');
        let lastCardsEl = null;
        for (let i = allBubbles.length - 1; i >= 0; i--) {
          const cards = allBubbles[i].querySelectorAll('.mcq-card');
          if (cards.length > 0) { lastCardsEl = cards; break; }
        }

        if (!lastCardsEl || !lastCardsEl.length)
          return `<div style="color:var(--hard)">⚠️ No questions are currently shown.</div>`;

        // Store shown questions globally for export
        const questions = [];
        lastCardsEl.forEach(card => {
          const dataRaw = card.getAttribute('data-question');
          if (dataRaw) {
            try { questions.push(JSON.parse(dataRaw)); } catch { }
          }
        });

        if (!questions.length)
          return `<div style="color:var(--hard)">⚠️ Could not read shown questions.</div>`;

        window._saveCustomQuestions = questions;

        return `<div>
      <div style="font-weight:600;font-size:13px;margin-bottom:6px">💾 Save ${questions.length} shown questions as:</div>
      <div style="display:flex;gap:8px;margin-top:8px">
        <button class="export-btn-inline pdf" onclick="doSaveCustomFmt('pdf')">📄 PDF</button>
        <button class="export-btn-inline docx" onclick="doSaveCustomFmt('docx')">📝 Word</button>
      </div>
    </div>`;
      } catch {
        return `<div style="color:var(--hard)">⚠️ Failed.</div>`;
      }
    }

    async function doSaveCustomFmt(fmt) {
      const questions = window._saveCustomQuestions;
      if (!questions || !questions.length) {
        addMessage('bot', '', `<div style="color:var(--hard)">⚠️ No questions to save.</div>`);
        return;
      }
      try {
        // Send questions to backend for export
        const r = await fetch(`${BACKEND}/api/export/custom?fmt=${fmt}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ questions })
        });
        if (!r.ok) throw new Error();
        const blob = await r.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `selected_questions.${fmt}`;
        a.click();
        URL.revokeObjectURL(url);
        window._saveCustomQuestions = null;
        addMessage('bot', '', `<div style="color:var(--easy)">✅ Saved ${questions.length} questions as <b>.${fmt}</b>!</div>`);
      } catch {
        addMessage('bot', '', `<div style="color:var(--hard)">⚠️ Export failed. Need backend endpoint /api/export/custom</div>`);
      }
    }

    async function handleChatFallback(text, session) {
      return `<div style="color:var(--text2);font-size:13px">🙏 Sorry, I'm only able to assist with your MCQ questions. Please try asking something related to your MCQ files.</div>`;
    }

    function confirmDownload(fmt) {
      if (!pendingDownload) return;
      const { topics, questions } = pendingDownload; pendingDownload = null;
      if (fmt === 'json') {
        const blob = new Blob([JSON.stringify({ topics, questions }, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = `${topics.join('_')}_questions.json`; a.click(); URL.revokeObjectURL(url);
        addMessage('bot', '', `<div style="color:var(--easy)">✅ Downloaded <b>${topics.join(' + ')}</b> questions as <b>.json</b>!</div>`);
      } else if (fmt === 'docx') {
        const params = new URLSearchParams({ fmt: 'docx', topics: topics.join(',') });
        fetch(`${BACKEND}/api/export?${params}`).then(r => { if (!r.ok) throw new Error(); return r.blob(); }).then(blob => {
          const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = `${topics.join('_')}_questions.docx`; a.click(); URL.revokeObjectURL(url);
          addMessage('bot', '', `<div style="color:var(--easy)">✅ Downloaded <b>${topics.join(' + ')}</b> questions as <b>.docx</b>!</div>`);
        }).catch(() => addMessage('bot', '', `<div style="color:var(--hard)">⚠️ DOCX export failed.</div>`));
      } else {
        let txt = ''; questions.forEach((q, i) => { txt += `${i + 1}. ${q.question}\n   A) ${q.option_a || ''}\n   B) ${q.option_b || ''}\n   C) ${q.option_c || ''}\n   D) ${q.option_d || ''}\n   Answer: ${q.answer || ''}\n   Topic: ${q.topic || ''}\n\n`; });
        const blob = new Blob([txt], { type: 'text/plain' }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = `${topics.join('_')}_questions.txt`; a.click(); URL.revokeObjectURL(url);
        addMessage('bot', '', `<div style="color:var(--easy)">✅ Downloaded <b>${topics.join(' + ')}</b> questions as <b>.txt</b>!</div>`);
      }
    }

    // ─── QUESTION TYPE DETECTION ──────────────────────────────────────────────
    function detectQuestionType(question, topic) {
      const t = (topic || '').toLowerCase();
      const isAptitude = t.includes('aptitude');
      if (isAptitude) return ['Calculation Based', 'Communication Based'];
      return ['Code Based', 'One Word Based'];
    }

    function isCodeBased(question) {
      return false; // model will classify via question_type field
    }

    // ─── SHOW QUESTIONS FLOW ──────────────────────────────────────────────────
    let _sqFlow = { step: null, topic: null, difficulty: null, qtype: null, questions: [] };

    async function startShowQuestionsFlow() {
      try {
        const r = await fetch(`${BACKEND}/api/mcqs?_t=${Date.now()}`);
        const data = await r.json();
        const questions = data.mcqs || data.questions || [];
        if (!questions.length) {
          addMessage('bot', '', `<div style="color:var(--text2)">No questions found. Upload a file first.</div>`);
          return;
        }
        _sqFlow.questions = questions;
        window._practiceAllQuestions = questions;
        window._practiceFullList = questions;

        // If a panel already exists, just switch to All Topics — don't create a new one
        const existingFilters = document.querySelector('#topic-filters');
        if (existingFilters) {
          switchPracticeTopic('All');
          addMessage('bot', '', `<div style="color:var(--text2);font-size:12px">📋 Switched to <b>All Topics</b></div>`);
          return;
        }

        const _diffs = [...new Set(questions.map(q => q.difficulty).filter(Boolean))];
        window._hasMultipleDifficulties = _diffs.length > 1 || _diffs.some(d => d.toLowerCase() !== 'medium');
        const topics = [...new Set(questions.map(q => q.topic).filter(Boolean))];
        const difficulties = [...new Set(questions.map(q => q.difficulty).filter(Boolean))];
        const hasDifficulty = difficulties.some(d => d.toLowerCase() !== 'medium') || difficulties.length > 1;

        if (topics.length === 1) {
          _sqFlow.topic = topics[0];
          if (hasDifficulty) {
            _sqFlow.step = 'difficulty';
            showDifficultyStep();
          } else {
            window._practiceAllQuestions = questions;
            addMessage('bot', '', buildNormalView(questions, null));
            _sqFlow = { step: null, topic: null, difficulty: null, qtype: null, questions: [] };
          }
        } else {
          _sqFlow.step = 'topic';
          showTopicStep(topics);
        }
      } catch {
        addMessage('bot', '', `<div style="color:var(--hard)">⚠️ Could not fetch questions.</div>`);
      }
    }

    function showTopicStep(topics) {
      const btns = topics.map(t =>
        `<button class="sq-btn" onclick="selectSQTopic('${t}')">${t}</button>`
      ).join('');
      addMessage('bot', '', `<div>
    <div style="font-weight:600;font-size:13px;margin-bottom:10px">📁 Choose a topic:</div>
    <div style="display:flex;flex-wrap:wrap;gap:8px">
      <button class="sq-btn" style="border-color:rgba(167,139,250,.3);color:var(--accent);background:rgba(167,139,250,.08)" onclick="selectSQTopic('All')">All Topics</button>
      ${btns}
    </div>
  </div>`);
    }

    function selectSQTopic(topic) {
      _sqFlow.topic = topic;
      addMessage('user', topic);
      // Always filter from the original full list, not already-filtered list
      const allQuestions = window._practiceFullList?.length
        ? window._practiceFullList
        : _sqFlow.questions;
      const filtered = topic === 'All'
        ? allQuestions
        : allQuestions.filter(q => (q.topic || '').toLowerCase() === topic.toLowerCase());
      const difficulties = [...new Set(filtered.map(q => q.difficulty).filter(Boolean))];
      const hasDifficulty = difficulties.some(d => d.toLowerCase() !== 'medium') || difficulties.length > 1;

      if (hasDifficulty && topic !== 'All') {
        _sqFlow.questions = filtered;
        _sqFlow.step = 'difficulty';
        showDifficultyStep();
      } else {
        addMessage('bot', '', buildNormalView(window._practiceFullList, topic === 'All' ? null : topic));
        _sqFlow = { step: null, topic: null, difficulty: null, qtype: null, questions: [] };
      }
    }

    function showDifficultyStep() {
      const btns = ['Easy', 'Medium', 'Hard'].map(d =>
        `<button class="sq-btn sq-btn-${d.toLowerCase()}" onclick="selectSQDifficulty('${d}')">${d}</button>`
      ).join('');
      addMessage('bot', '', `<div>
    <div style="font-weight:600;font-size:13px;margin-bottom:10px">🎯 Choose difficulty level:</div>
    <div style="display:flex;gap:8px">${btns}</div>
  </div>`);
    }

    function selectSQDifficulty(difficulty) {
      _sqFlow.difficulty = difficulty;
      _sqFlow.step = 'qtype';
      addMessage('user', difficulty);

      const fullList = window._practiceFullList;
      let filtered = fullList;
      if (_sqFlow.topic) filtered = filtered.filter(q => (q.topic || '').toLowerCase() === _sqFlow.topic.toLowerCase());
      filtered = filtered.filter(q => (q.difficulty || '').toLowerCase() === difficulty.toLowerCase());

      if (!filtered.length) {
        addMessage('bot', '', `<div style="color:var(--text2)">⚠️ No <b>${difficulty}</b> questions found for this topic.</div>`);
        return;
      }
      window._practiceDiffFiltered = filtered;
      if (_sqFlow.isPractice) {
        addMessage('bot', '', buildPracticeViewFiltered(window._practiceFullList, _sqFlow.topic || null, filtered));
      } else {
        addMessage('bot', '', buildNormalViewFiltered(window._practiceFullList, _sqFlow.topic || null, filtered));
      }
    }

    function buildMcqCard(q, num, practiceMode = false, hideAnswer = false) {
      const ans = q.answer || '';
      const qId = q.id || q._id || num;
      if (practiceMode) {
        const opts = ['A', 'B', 'C', 'D'].map(k => {
          const v = q[`option_${k.toLowerCase()}`] || '';
          if (!v) return '';
          return `<div class="mcq-opt practice-opt" data-key="${k}" data-correct="${ans.toUpperCase() === k}" onclick="handlePracticeOpt(this, '${qId}')">
        <span class="opt-key">${k}</span>${v}
      </div>`;
        }).join('');
        return `<div class="mcq-card" id="pcard-${qId}" data-question='${JSON.stringify(q).replace(/'/g, "&#39;")}'>
      <div class="mcq-header">
        <span class="mcq-num">Q${num}</span>
        <span class="mcq-q">${q.question || ''}</span>
        ${q.difficulty ? `<span class="diff-badge ${q.difficulty.toLowerCase()}">${q.difficulty}</span>` : ''}
      </div>
      <div class="mcq-options">${opts}</div>
      <div class="practice-feedback" id="pfb-${qId}" style="display:none;margin-top:8px;padding:6px 10px;border-radius:6px;font-size:12px;font-weight:600"></div>
      <div class="answer-reveal" id="ans-reveal-${qId}">✅ Answer: ${ans} — ${q[`option_${ans.toLowerCase()}`] || ''}</div>
      <div class="practice-card-actions">
        <button class="show-answer-btn" onclick="toggleAnswer(this.dataset.qid, this)" data-qid="${qId}">
          <span>⬇️</span><span>Show Answer</span>
        </button>
        <button class="done-btn" id="done-btn-${qId}" onclick="toggleDone('${qId}', this)" title="Mark as done">✓</button>
        <div style="margin-left:auto;font-size:11px;color:var(--text3)">🏷 ${q.topic || 'General'}</div>
      </div>
    </div>`;
      }

      const opts = ['A', 'B', 'C', 'D'].map(k => {
        const v = q[`option_${k.toLowerCase()}`] || '';
        if (!v) return '';
        return `<div class="mcq-opt ${ans.toUpperCase() === k ? 'correct' : ''}"><span class="opt-key">${k}</span>${v}</div>`;
      }).join('');
      const hasOpts = ['A', 'B', 'C', 'D'].some(k => q[`option_${k.toLowerCase()}`]);
      const ansKeys = ans.split(',').map(k => k.trim()).filter(Boolean);
      const ansText = ansKeys.map(k => `${k} — ${q[`option_${k.toLowerCase()}`] || ''}`).join(', ');
      return `<div class="mcq-card" data-question='${JSON.stringify(q).replace(/'/g, "&#39;")}'>
  <div class="mcq-header">
    <span class="mcq-num">Q${num}</span>
    <span class="mcq-q">${q.question || ''}</span>
    ${q.difficulty ? `<span class="diff-badge ${q.difficulty.toLowerCase()}">${q.difficulty}</span>` : ''}
    <button class="edit-icon-btn" title="Edit" onclick='openEditModal(${JSON.stringify(q).replace(/'/g, "&#39;")})'>✏️</button>
  </div>
  <div class="mcq-options">${opts}</div>
  ${hasOpts && ans && !hideAnswer ? `<div style="margin-top:8px;padding:6px 10px;background:rgba(52,211,153,.08);border-radius:6px;border:1px solid rgba(52,211,153,.2);font-size:12px;color:var(--easy);font-weight:600">✅ Answer: ${ansText}</div>` : ''}
  <div style="margin-top:4px;font-size:11px;color:var(--text3)">🏷 ${q.topic || 'General'}${q.source_file ? ' • ' + q.source_file : ''}</div>
</div>`;
    }
    // ─── PRACTICE MODE ────────────────────────────────────────────────────────────
    let practiceScore = { correct: 0, total: 0 };

    function handlePracticeOpt(el, qId) {
      const card = document.getElementById(`pcard-${qId}`);
      if (!card || card.dataset.answered) return;
      card.dataset.answered = '1';

      const isCorrect = el.dataset.correct === 'true';
      const correctKey = el.closest('.mcq-options').querySelector('[data-correct="true"]');

      // Lock all options
      card.querySelectorAll('.practice-opt').forEach(opt => {
        opt.style.pointerEvents = 'none';
        if (opt.dataset.correct === 'true') {
          opt.style.background = 'rgba(52,211,153,.15)';
          opt.style.borderColor = 'rgba(52,211,153,.5)';
          opt.style.color = 'var(--easy)';
          opt.querySelector('.opt-key').style.color = 'var(--easy)';
        }
      });

      if (!isCorrect) {
        el.style.background = 'rgba(248,113,113,.15)';
        el.style.borderColor = 'rgba(248,113,113,.5)';
        el.style.color = 'var(--hard)';
        el.querySelector('.opt-key').style.color = 'var(--hard)';
      }

      practiceScore.total++;
      if (isCorrect) practiceScore.correct++;

      const fb = document.getElementById(`pfb-${qId}`);
      if (fb) {
        fb.style.display = 'block';
        if (isCorrect) {
          fb.style.background = 'rgba(52,211,153,.08)';
          fb.style.border = '1px solid rgba(52,211,153,.2)';
          fb.style.color = 'var(--easy)';
          fb.textContent = '✅ Correct!';
        } else {
          const correctText = correctKey?.nextSibling?.textContent || correctKey?.textContent || '';
          fb.style.background = 'rgba(248,113,113,.08)';
          fb.style.border = '1px solid rgba(248,113,113,.2)';
          fb.style.color = 'var(--hard)';
          const correctOptEl = correctKey?.parentElement?.querySelector(`[data-key="${correctKey?.dataset.key}"]`);
          const correctOptText = correctOptEl ? correctOptEl.childNodes[1]?.textContent?.trim() || correctOptEl.textContent.replace(correctKey.dataset.key, '').trim() : '';
          fb.textContent = `❌ Wrong! Correct answer: ${correctKey?.dataset.key} — ${correctOptText}`;
        }
      }

      updateScoreTracker();
    }

    function updateScoreTracker() {
      const tracker = document.getElementById('score-tracker');
      if (tracker) {
        tracker.textContent = `Score: ${practiceScore.correct} / ${practiceScore.total}`;
        tracker.style.color = practiceScore.correct === practiceScore.total && practiceScore.total > 0 ? 'var(--easy)' : 'var(--text2)';
      }
    }

    function toggleAnswer(qId, btn) {
      const card = btn.closest('.mcq-card');
      if (!card) return;
      const reveal = card.querySelector('.answer-reveal');
      if (!reveal) return;
      const isShowing = getComputedStyle(reveal).display !== 'none';
      reveal.style.setProperty('display', isShowing ? 'none' : 'block', 'important');
      btn.innerHTML = isShowing
        ? '<span>⬇️</span><span>Show Answer</span>'
        : '<span>⬆️</span><span>Hide Answer</span>';
    }

    function toggleDone(qId, btn) {
      btn.classList.toggle('done');
      const card = document.getElementById(`pcard-${qId}`);
      if (card) {
        if (btn.classList.contains('done')) {
          card.style.opacity = '0.6';
          card.style.borderColor = 'rgba(52,211,153,.3)';
        } else {
          card.style.opacity = '1';
          card.style.borderColor = 'var(--border)';
        }
      }
    }

    function buildPracticeView(questions, activeTopic) {
      practiceScore = { correct: 0, total: 0 };
      const topics = ['All', ...new Set(questions.map(q => q.topic).filter(Boolean))];
      const filtered = activeTopic && activeTopic !== 'All'
        ? questions.filter(q => (q.topic || '').toLowerCase().trim() === activeTopic.toLowerCase().trim())
        : questions;

      const topicBtns = topics.map(t =>
        `<button class="topic-filter-btn ${t === (activeTopic || 'All') ? 'active' : ''}" onclick="switchPracticeTopic('${t}')">${t}</button>`
      ).join('');

      const cards = filtered.map((q, i) => buildMcqCard(q, i + 1, true)).join('');

      return `<div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap">
      <div style="font-weight:600;font-size:13px">🎯 Practice Mode</div>
      <div id="score-tracker" style="margin-left:auto;font-size:12px;font-weight:600;color:var(--text2);background:var(--surface2);border:1px solid var(--border);padding:4px 12px;border-radius:20px">Score: 0 / 0</div>
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px" id="topic-filters">${topicBtns}</div>
    <div id="practice-cards">${cards}</div>
  </div>`;
    }

    function buildPracticeViewFiltered(allQuestions, activeTopic, filteredQuestions) {
      practiceScore = { correct: 0, total: 0 };
      const topics = ['All', ...new Set(allQuestions.map(q => q.topic).filter(Boolean))];
      const topicBtns = topics.map(t =>
        `<button class="topic-filter-btn ${t === (activeTopic || 'All') ? 'active' : ''}" onclick="switchPracticeTopic('${t}')">${t}</button>`
      ).join('');
      const cards = filteredQuestions.map((q, i) => buildMcqCard(q, i + 1, true)).join('');
      return `<div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap">
      <div style="font-weight:600;font-size:13px">🎯 Practice Mode</div>
      <div id="score-tracker" style="margin-left:auto;font-size:12px;font-weight:600;color:var(--text2);background:var(--surface2);border:1px solid var(--border);padding:4px 12px;border-radius:20px">Score: 0 / 0</div>
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px" id="topic-filters">${topicBtns}</div>
    <div id="practice-cards">${cards}</div>
  </div>`;
    }

    function buildNormalViewFiltered(allQuestions, activeTopic, filteredQuestions) {
      const topics = ['All', ...new Set(allQuestions.map(q => q.topic).filter(Boolean))];
      const topicBtns = topics.map(t =>
        `<button class="topic-filter-btn ${t === (activeTopic || 'All') ? 'active' : ''}" onclick="switchPracticeTopic('${t}')">${t}</button>`
      ).join('');
      const cards = filteredQuestions.map((q, i) => buildNormalCard(q, i + 1)).join('');
      return `<div>
    <div style="font-weight:600;font-size:13px;margin-bottom:12px">📋 Questions</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px" id="topic-filters">${topicBtns}</div>
    <div id="practice-cards" class="sdm-grid" style="max-height:560px;overflow-y:auto;padding-right:8px;scrollbar-width:thin;scrollbar-color:var(--border) transparent">${cards}</div>
  </div>`;
    }

    function buildNormalCard(q, num) {
      if (!q.question || q.question.trim().toLowerCase() === 'nan') return '';
      const ans = q.answer || '';
      const qId = (q.id || q._id || num).toString().replace(/[^a-zA-Z0-9_-]/g, '_');
      const dataType = (q.tags || '').toLowerCase();
      const itemOID = q.explanation || '';
      const hasOptions = ['A', 'B', 'C', 'D'].some(k => {
        const val = q[`option_${k.toLowerCase()}`];
        return val && val.trim() !== '' && val.trim().toLowerCase() !== 'nan';
      });

      let inputHtml = '';

      if (hasOptions) {
        // CodeList question — show radio buttons
        const opts = ['A', 'B', 'C', 'D'].map(k => {
          const v = q[`option_${k.toLowerCase()}`] || '';
          if (!v || v.trim() === '' || v.trim().toLowerCase() === 'nan') return '';
          return `<div class="mcq-opt" style="cursor:pointer" onclick="selectSDMOption('${qId}', '${k}', this)">
    <span class="opt-key">${k}</span>${v}
  </div>`;
        }).join('');
        inputHtml = `<div class="mcq-options" id="opts-${qId}">${opts}</div>`;
      } else if (dataType === 'integer' || dataType === 'float') {
        inputHtml = `<div style="margin:8px 0;display:flex;align-items:center;gap:8px">
          <input type="text" id="input-${qId}" data-oid="${itemOID}"
            placeholder="Enter value..."
            style="flex:1;padding:8px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:Inter,sans-serif;font-size:13px;outline:none"
            oninput="this.dataset.val=this.value" onchange="saveSDMValue('${qId}', '${itemOID}', this.value)">
          <span id="saved-${qId}" style="display:none;color:var(--easy);font-size:11px;font-weight:600;flex-shrink:0">✅ Saved</span>
        </div>`;
      } else if (dataType === 'boolean') {
        inputHtml = `<div style="margin:8px 0;display:flex;gap:8px;align-items:center">
          <button class="mcq-opt" style="cursor:pointer;flex:1"
            onclick="selectSDMBoolean('${qId}', '${itemOID}', 'Yes', this)">
            <span class="opt-key">A</span>Yes
          </button>
          <button class="mcq-opt" style="cursor:pointer;flex:1"
            onclick="selectSDMBoolean('${qId}', '${itemOID}', 'No', this)">
            <span class="opt-key">B</span>No
          </button>
          <span id="saved-${qId}" style="display:none;color:var(--easy);font-size:11px;font-weight:600;flex-shrink:0">✅ Saved</span>
        </div>`;
      } else {
        inputHtml = `<div style="margin:8px 0;display:flex;align-items:center;gap:8px">
          <input type="text" id="input-${qId}" data-oid="${itemOID}"
            placeholder="Enter value..."
            style="flex:1;padding:8px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:Inter,sans-serif;font-size:13px;outline:none"
            oninput="this.dataset.val=this.value" onchange="saveSDMValue('${qId}', '${itemOID}', this.value)">
          <span id="saved-${qId}" style="display:none;color:var(--easy);font-size:11px;font-weight:600;flex-shrink:0">✅ Saved</span>
        </div>`;
      }

      const typeLabel = {
        'integer': '🔢 Number',
        'float': '🔢 Decimal',
        'boolean': '✅ Yes / No',
        'singleselect': '☑️ Single Choice',
        'multiselect': '☑️ Multi Choice',
        'text': '📝 Text',
        'string': '📝 Text'
      }[dataType] || '';

      return `<div class="mcq-card sdm-card" id="ncard-${qId}" data-question='${JSON.stringify(q).replace(/'/g, "&#39;")}'>
    <div style="display:flex;align-items:flex-start;gap:10px">
      <span style="font-family:'JetBrains Mono',monospace;font-size:10px;color:#fff;font-weight:700;background:var(--accent);padding:2px 7px;border-radius:20px;flex-shrink:0;margin-top:2px">Q${num}</span>
      <span style="font-size:13px;font-weight:600;color:var(--text);line-height:1.5;flex:1">${q.question || ''}</span>
      <button class="edit-icon-btn" title="Edit" onclick='openEditModal(${JSON.stringify(q).replace(/'/g, "&#39;")})'>✏️</button>
    </div>
    <div class="sdm-input-area">${inputHtml}</div>
    <div class="sdm-footer" style="min-height:10px"></div>
  </div>`;
    }

    function buildNormalView(questions, activeTopic) {
      const formId = 'form_' + Date.now();
      if (!activeTopic) {
        const groups = _getGroupsFromQuestions(questions);
        _formFlow = { active: true, groups, currentIndex: 0, answers: {} };
      } else {
        const groups = _getGroupsFromQuestions(questions);
        const groupIndex = groups.findIndex(g => g.toLowerCase() === (activeTopic || '').toLowerCase());
        _formFlow = {
          active: true,
          groups,
          currentIndex: groupIndex >= 0 ? groupIndex : 0,
          answers: {}
        };
      }

      const topics = [...new Set(questions.map(q => q.topic).filter(t => t && t.trim().toLowerCase() !== 'nan'))];
      const currentGroup = _formFlow.groups[_formFlow.currentIndex];
      const filtered = questions.filter(q =>
        (q.topic || '').toLowerCase().trim() === (activeTopic || currentGroup || '').toLowerCase().trim()
      );

      const topicBtns = topics.map(t =>
        `<button class="topic-filter-btn ${t === (activeTopic || topics[0]) ? 'active' : ''}" onclick="switchPracticeTopicIn('${formId}','${t}')">${t}</button>`
      ).join('');
      const cards = filtered.map((q, i) => buildNormalCard(q, i + 1)).join('');
      const groupName = activeTopic || 'All';
      window._activeGroupName = activeTopic || null;
      if (!window._skipLoadResponses) {
        setTimeout(() => loadSDMResponses(), 100);
      } else {
        window._skipLoadResponses = false;
      }

      const groups = _formFlow.groups;
      const currentIndex = _formFlow.currentIndex;
      const isLastGroup = currentIndex >= groups.length - 1;
      const isFirstGroup = currentIndex === 0;

      const progressBar = groups.length > 1 ? `
    <div class="flow-progress">
      ${groups.map((g, i) => {
        let cls = 'flow-progress-step';
        if (i < currentIndex) cls += ' done';
        else if (i === currentIndex) cls += ' active';
        const line = i < groups.length - 1 ? '<div class="flow-progress-line"></div>' : '';
        return `<div class="${cls}"><div class="flow-progress-dot"></div><span>${g}</span></div>${line}`;
      }).join('')}
    </div>` : '';

      const backBtn = !isFirstGroup
        ? `<button class="flow-btn flow-btn-back" onclick="goBackGroupIn('${formId}')">← Back</button>` : '';

      const actionBtn = _formFlow.groups.length === 1
        ? ''
        : isLastGroup
          ? `<button class="flow-btn flow-btn-confirm" onclick="confirmFullFormIn('${formId}')">✅ Confirm & Submit</button>`
          : `<button class="flow-btn flow-btn-next" onclick="goNextGroupIn('${formId}')">Next Group →</button>`;

      const saveBtn = `<button onclick="saveGroupAnswersIn('${formId}','${groupName}')"
    style="padding:9px 22px;background:var(--surface3);border:1px solid var(--border2);border-radius:20px;color:var(--text2);font-family:Inter,sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s"
    onmouseover="this.style.background='var(--surface2)';this.style.color='var(--text)'"
    onmouseout="this.style.background='var(--surface3)';this.style.color='var(--text2)'">
    💾 Save Group
  </button>`;

      return `<div data-form-id="${formId}">
    <div style="font-weight:600;font-size:13px;margin-bottom:10px">📋 Questions
      <span style="font-size:11px;font-weight:400;color:var(--text3);margin-left:8px">
        Group ${currentIndex + 1} of ${groups.length}
      </span>
    </div>
    ${progressBar}
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px" id="topic-filters-${formId}">${topicBtns}</div>
    <div id="practice-cards-${formId}" class="sdm-grid" style="max-height:560px;overflow-y:auto;padding-right:8px;scrollbar-width:thin;scrollbar-color:var(--border) transparent">${cards}</div>
    <div id="flow-error-msg-${formId}" class="flow-error"></div>
    <div class="flow-nav">
      ${backBtn}
      ${saveBtn}
      ${actionBtn}
    </div>
  </div>`;
    }

    function switchPracticeTopicIn(formId, topic) {
      if (window._formJustSubmitted) return;
      const bubble = document.querySelector(`[data-form-id="${formId}"]`)?.closest('.msg-bubble');
      if (!bubble) return switchPracticeTopic(topic);
      window._activeGroupName = topic || null;
      fetch(`${BACKEND}/api/mcqs?_t=${Date.now()}`)
        .then(r => r.json())
        .then(data => {
          const questions = data.mcqs || data.questions || [];
          if (!questions.length) return;
          if (window._formJustSubmitted) return;  // ← ADD THIS LINE
          window._practiceFullList = questions;
          window._practiceAllQuestions = questions;
          bubble.innerHTML = buildNormalView(questions, topic === 'All' ? null : topic);
        });
    }

    function goNextGroupIn(formId) {
      const errEl = document.getElementById(`flow-error-msg-${formId}`);
      const cards = document.querySelectorAll(`#practice-cards-${formId} .mcq-card`);
      const answers = _collectGroupAnswersFromCards(cards);
      const unfilled = answers.filter(a => !a.value || a.value.trim() === '');
      if (unfilled.length > 0) {
        if (errEl) { errEl.style.display = 'block'; errEl.textContent = `⚠️ Please fill in all ${unfilled.length} unanswered question${unfilled.length > 1 ? 's' : ''} before continuing.`; }
        cards.forEach(card => {
          const raw = card.getAttribute('data-question'); if (!raw) return;
          try { const q = JSON.parse(raw); const qId = (q.id || q._id || '').toString().replace(/[^a-zA-Z0-9_-]/g, '_'); const a = answers.find(a => a.qId === qId); card.style.borderColor = a && !a.value ? 'rgba(248,113,113,.5)' : ''; card.style.boxShadow = a && !a.value ? '0 0 0 2px rgba(248,113,113,.15)' : ''; } catch { }
        });
        return;
      }
      if (errEl) errEl.style.display = 'none';
      const groupName = _formFlow.groups[_formFlow.currentIndex];
      _formFlow.answers[groupName] = answers;
      _saveAnswersBatch(answers);
      _formFlow.currentIndex++;
      const nextGroup = _formFlow.groups[_formFlow.currentIndex];
      fetch(`${BACKEND}/api/mcqs?_t=${Date.now()}`).then(r => r.json()).then(data => {
        const questions = data.mcqs || data.questions || [];
        window._practiceFullList = questions;
        const bubble = document.querySelector(`[data-form-id="${formId}"]`)?.closest('.msg-bubble');
        if (bubble) bubble.innerHTML = buildNormalView(questions, nextGroup);
      });
    }

    function goBackGroupIn(formId) {
      if (_formFlow.currentIndex <= 0) return;
      _formFlow.currentIndex--;
      const prevGroup = _formFlow.groups[_formFlow.currentIndex];
      fetch(`${BACKEND}/api/mcqs?_t=${Date.now()}`).then(r => r.json()).then(data => {
        const questions = data.mcqs || data.questions || [];
        window._practiceFullList = questions;
        const bubble = document.querySelector(`[data-form-id="${formId}"]`)?.closest('.msg-bubble');
        if (bubble) bubble.innerHTML = buildNormalView(questions, prevGroup);
      });
    }

    function saveGroupAnswersIn(formId, groupName) {
      const cards = document.querySelectorAll(`#practice-cards-${formId} .mcq-card`);
      window._pendingGroupAnswers = _collectGroupAnswersFromCards(cards).filter(a => a.value);
      if (!window._pendingGroupAnswers.length) { alert('Please fill in at least one answer before saving.'); return; }
      saveGroupAnswers(groupName); // reuse existing modal logic
    }

    function confirmFullFormIn(formId) {
      const cards = document.querySelectorAll(`#practice-cards-${formId} .mcq-card`);
      const answers = _collectGroupAnswersFromCards(cards);
      const unfilled = _validateGroupAnswers(answers);
      const errEl = document.getElementById(`flow-error-msg-${formId}`);
      if (unfilled.length > 0) {
        if (errEl) { errEl.style.display = 'block'; errEl.textContent = `⚠️ Please fill in all ${unfilled.length} unanswered question${unfilled.length > 1 ? 's' : ''} before confirming.`; }
        return;
      }
      if (errEl) errEl.style.display = 'none';
      const groupName = _formFlow.groups[_formFlow.currentIndex];
      _formFlow.answers[groupName] = answers;
      _saveAnswersBatch(answers);
      confirmFullForm(); // reuse existing submit logic
    }

    function _collectGroupAnswersFromCards(cards) {
      const answers = [];
      cards.forEach(card => {
        const raw = card.getAttribute('data-question'); if (!raw) return;
        try {
          const q = JSON.parse(raw);
          const qId = (q.id || q._id || '').toString().replace(/[^a-zA-Z0-9_-]/g, '_');
          let value = '';
          const selectedOpts = [...card.querySelectorAll('.mcq-opt.selected')];
          if (selectedOpts.length > 0) value = selectedOpts.map(o => o.querySelector('.opt-key')?.textContent.trim()).map(k => q[`option_${k?.toLowerCase()}`] || k).join(', ');
          if (!value) { const inputs = card.querySelectorAll('input, textarea, select'); inputs.forEach(inp => { const v = inp.dataset.val !== undefined ? inp.dataset.val : inp.value; if (v && v.trim()) value = v.trim(); }); }
          answers.push({ q, qId, value, itemOID: q.explanation || '' });
        } catch { }
      });
      return answers;
    }

    async function saveGroupAnswers(groupName) {
      // Collect all filled answers from visible cards
      const cards = document.querySelectorAll('#practice-cards .mcq-card');
      const answers = [];

      cards.forEach(card => {
        const raw = card.getAttribute('data-question');
        if (!raw) return;
        try {
          const q = JSON.parse(raw);
          const qId = (q.id || q._id || '').toString().replace(/[^a-zA-Z0-9_-]/g, '_');
          let value = '';

          // Check selected option
          const selectedOpt = card.querySelector('.mcq-opt.selected') ||
            [...(card.querySelectorAll('.mcq-opt'))].find(o => o.style.background !== '');
          if (selectedOpt) {
            value = selectedOpt.textContent.trim().replace(/^[A-Da-d]\s*/, '').trim();
          }

          // Check input field
          const input = card.querySelector(`#input-${qId}`);
          if (input && input.value.trim()) value = input.value.trim();

          if (value) answers.push({ q, qId, value, itemOID: q.explanation || '' });
        } catch { }
      });

      if (!answers.length) {
        alert('Please fill in at least one answer before saving.');
        return;
      }

      // Build preview
      const previewRows = answers.map(({ q, value }) =>
        `<div style="padding:10px 14px;background:var(--surface2);border-radius:8px;border:1px solid var(--border);margin-bottom:8px">
      <div style="font-size:12px;color:var(--text2);margin-bottom:4px">${q.question}</div>
      <div style="font-size:13px;font-weight:600;color:var(--accent)">✅ ${value}</div>
    </div>`
      ).join('');

      // Show preview modal
      const modal = document.createElement('div');
      modal.id = 'group-save-modal';
      modal.style.cssText = 'position:fixed;inset:0;z-index:700;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center';
      modal.innerHTML = `
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;width:500px;max-height:80vh;overflow-y:auto">
      <div style="font-size:15px;font-weight:700;margin-bottom:4px">👁 Preview — ${groupName}</div>
      <div style="font-size:12px;color:var(--text3);margin-bottom:16px">${answers.length} answers filled</div>
      ${previewRows}
      <div style="display:flex;gap:8px;margin-top:16px">
        <button onclick="confirmGroupSave()" 
          style="flex:1;padding:10px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-family:Inter,sans-serif;font-size:13px;font-weight:600;cursor:pointer">
          ✅ Confirm & Save
        </button>
        <button onclick="document.getElementById('group-save-modal').remove()"
          style="padding:10px 18px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text2);font-family:Inter,sans-serif;font-size:13px;cursor:pointer">
          Cancel
        </button>
      </div>
    </div>`;
      document.body.appendChild(modal);

      // Store answers for confirm
      window._pendingGroupAnswers = answers;
    }

    async function confirmGroupSave() {
      const answers = window._pendingGroupAnswers;
      if (!answers || !answers.length) return;

      let saved = 0;
      for (const { qId, itemOID, value } of answers) {
        await saveSDMValue(qId, itemOID, value);
        saved++;
      }

      document.getElementById('group-save-modal')?.remove();
      window._pendingGroupAnswers = null;

      addMessage('bot', '', `<div style="color:var(--easy);font-weight:600">✅ ${saved} answers saved successfully!</div>`);
    }

    function selectSDMOption(qId, key, el) {
      const card = document.getElementById(`ncard-${qId}`);
      const q = JSON.parse(card.getAttribute('data-question'));

      // Toggle: if already selected, deselect it
      if (el.classList.contains('selected')) {
        el.classList.remove('selected');
        el.style.background = '';
        el.style.borderColor = '';
        el.style.color = '';

        // Collect remaining selected options and save
        const remaining = [...document.querySelectorAll(`#opts-${qId} .mcq-opt.selected`)]
          .map(o => o.querySelector('.opt-key').textContent.trim())
          .map(k => q[`option_${k.toLowerCase()}`] || k)
          .join(', ');
        saveSDMValue(qId, q.explanation || '', remaining);
        return;
      }

      // Select the clicked option (allow multiple)
      el.classList.add('selected');
      el.style.background = 'rgba(167,139,250,.15)';
      el.style.borderColor = 'rgba(167,139,250,.4)';
      el.style.color = 'var(--accent)';

      // Collect ALL selected options and save
      const allSelected = [...document.querySelectorAll(`#opts-${qId} .mcq-opt.selected`)]
        .map(o => o.querySelector('.opt-key').textContent.trim())
        .map(k => q[`option_${k.toLowerCase()}`] || k)
        .join(', ');
      saveSDMValue(qId, q.explanation || '', allSelected);
      const codedValue = q.option_values?.[`option_${key.toLowerCase()}`] || key;
      evaluateConditions(q.item_oid, codedValue);
    }

    function selectSDMBoolean(qId, itemOID, value, el) {
      const parent = el.parentElement;
      parent.querySelectorAll('.mcq-opt').forEach(o => {
        o.style.background = '';
        o.style.borderColor = '';
        o.style.color = '';
      });
      el.style.background = 'rgba(167,139,250,.15)';
      el.style.borderColor = 'rgba(167,139,250,.4)';
      el.style.color = 'var(--accent)';
      saveSDMValue(qId, itemOID, value);
    }
    async function submitSDMAnswer(qId, itemOID) {
      let value = '';

      // Check for selected option (any highlighted mcq-opt)
      const optsContainer = document.getElementById(`opts-${qId}`);
      if (optsContainer) {
        const selectedOpt = optsContainer.querySelector('.mcq-opt.selected') ||
          [...optsContainer.querySelectorAll('.mcq-opt')].find(o =>
            o.style.background !== '' || o.style.borderColor !== ''
          );
        if (selectedOpt) {
          value = selectedOpt.textContent.trim().replace(/^[A-Da-d☐☑]\s*/, '').trim();
        }
      }

      // Check for input field (integer/float/text/boolean)
      const input = document.getElementById(`input-${qId}`);
      if (input && input.value.trim()) value = input.value.trim();

      if (!value) {
        alert('Please enter or select a value first.');
        return;
      }

      await saveSDMValue(qId, itemOID, value);

      const status = document.getElementById(`saved-status-${qId}`);
      if (status) {
        status.style.display = 'inline';
        setTimeout(() => { status.style.display = 'none'; }, 2000);
      }
    }

    async function saveSDMValue(qId, itemOID, value) {
      if (!itemOID) return;
      try {
        await fetch(`${BACKEND}/api/sdm/response`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            filename: activeWorkingFile,
            item_oid: itemOID,
            value: value
          })
        });
        // Show saved indicator
        const input = document.getElementById(`input-${qId}`);
        if (input) {
          input.style.borderColor = 'rgba(52,211,153,.5)';
          const savedTag = document.getElementById(`saved-${qId}`);
          if (savedTag) savedTag.style.display = 'inline';
        }
      } catch (e) {
        console.error('Save failed:', e);
      }
    }

    async function loadSDMResponses() {
      if (window._formJustSubmitted) return;  // ← ADD THIS
      if (!activeWorkingFile) {
        try {
          const r = await fetch(`${BACKEND}/api/files/active`);
          if (r.ok) {
            const d = await r.json();
            activeWorkingFile = d.filename || d.active || null;
          }
        } catch { }
      }
      if (!activeWorkingFile) return;
      try {
        const r = await fetch(`${BACKEND}/api/sdm/responses?filename=${encodeURIComponent(activeWorkingFile)}`);
        if (!r.ok) return;
        const responses = await r.json();
        Object.entries(responses).forEach(([itemOID, value]) => {
          const inputs = document.querySelectorAll(`[data-oid="${itemOID}"]`);
          inputs.forEach(input => {
            input.value = value;
            input.style.borderColor = 'rgba(52,211,153,.5)';
            const qId = input.id.replace('input-', '');
            const savedTag = document.getElementById(`saved-${qId}`);
            if (savedTag) savedTag.style.display = 'inline';
          });
          document.querySelectorAll('.mcq-card').forEach(card => {
            const raw = card.getAttribute('data-question');
            if (!raw) return;
            try {
              const q = JSON.parse(raw);
              if (q.explanation !== itemOID) return;
              const qId = (q.id || q._id || '').toString().replace(/[^a-zA-Z0-9_-]/g, '_');
              const opts = document.querySelectorAll(`#opts-${qId} .mcq-opt`);
              opts.forEach(opt => {
                const optText = opt.textContent.trim().replace(/^[A-D]\s*/, '').trim();
                if (optText === value) {
                  opt.style.background = 'rgba(167,139,250,.15)';
                  opt.style.borderColor = 'rgba(167,139,250,.4)';
                  opt.style.color = 'var(--accent)';
                }
              });
            } catch { }
          });
        });
      } catch (e) {
        console.error('Load responses failed:', e);
      }
    }
    // ─── GROUP FORM FLOW ──────────────────────────────────────────────────────
    let _formFlow = { active: false, groups: [], currentIndex: 0, answers: {} };

    function _getGroupsFromQuestions(questions) {
      const seen = new Set();
      const groups = [];
      questions.forEach(q => {
        const g = q.topic || 'General';
        if (!seen.has(g) && g.trim().toLowerCase() !== 'nan') { seen.add(g); groups.push(g); }
      });
      return groups;
    }

    function _collectCurrentGroupAnswers() {
      const cards = document.querySelectorAll('#practice-cards .mcq-card');
      const answers = [];
      cards.forEach(card => {
        const raw = card.getAttribute('data-question');
        if (!raw) return;
        try {
          const q = JSON.parse(raw);
          const qId = (q.id || q._id || '').toString().replace(/[^a-zA-Z0-9_-]/g, '_');
          let value = '';

          // Check selected options (.selected class)
          const selectedOpts = [...card.querySelectorAll('.mcq-opt.selected')];
          if (selectedOpts.length > 0) {
            value = selectedOpts
              .map(o => o.querySelector('.opt-key')?.textContent.trim())
              .map(k => q[`option_${k?.toLowerCase()}`] || k)
              .join(', ');
          }

          // Check ANY input or textarea inside the card
          if (!value) {
            const inputs = card.querySelectorAll('input, textarea, select');
            inputs.forEach(inp => {
              const v = inp.dataset.val !== undefined ? inp.dataset.val : inp.value;
              if (v && v.trim()) value = v.trim();
            });
          }

          // Also check the global _formFlow.answers for previously saved values
          if (!value) {
            for (const grp in _formFlow.answers) {
              const saved = (_formFlow.answers[grp] || []).find(a => a.qId === qId);
              if (saved && saved.value) { value = saved.value; break; }
            }
          }

          answers.push({ q, qId, value, itemOID: q.explanation || '' });
        } catch (e) { console.error(e); }
      });
      return answers;
    }

    async function goNextGroup() {
      const answers = _collectCurrentGroupAnswers();
      const unfilled = answers.filter(a => !a.value || a.value.trim() === '');
      const errEl = document.getElementById('flow-error-msg');

      if (unfilled.length > 0) {
        if (errEl) {
          errEl.style.display = 'block';
          errEl.textContent = `⚠️ Please fill in all ${unfilled.length} unanswered question${unfilled.length > 1 ? 's' : ''} before continuing.`;
        }
        document.querySelectorAll('#practice-cards .mcq-card').forEach(card => {
          const raw = card.getAttribute('data-question');
          if (!raw) return;
          try {
            const q = JSON.parse(raw);
            const qId = (q.id || q._id || '').toString().replace(/[^a-zA-Z0-9_-]/g, '_');
            const a = answers.find(a => a.qId === qId);
            if (a && !a.value) {
              card.style.borderColor = 'rgba(248,113,113,.5)';
              card.style.boxShadow = '0 0 0 2px rgba(248,113,113,.15)';
            } else {
              card.style.borderColor = '';
              card.style.boxShadow = '';
            }
          } catch { }
        });
        return;
      }

      if (errEl) errEl.style.display = 'none';
      document.querySelectorAll('#practice-cards .mcq-card').forEach(card => {
        card.style.borderColor = '';
        card.style.boxShadow = '';
      });

      const groupName = _formFlow.groups[_formFlow.currentIndex];
      _formFlow.answers[groupName] = answers;
      await _saveAnswersBatch(answers);
      _formFlow.currentIndex++;
      const nextGroup = _formFlow.groups[_formFlow.currentIndex];

      fetch(`${BACKEND}/api/mcqs?_t=${Date.now()}`)
        .then(r => r.json())
        .then(data => {
          const questions = data.mcqs || data.questions || [];
          window._practiceFullList = questions;
          const targetBubble = _getFlowBubble();
          if (targetBubble) targetBubble.innerHTML = buildNormalView(questions, nextGroup);
        });
    }

    function _validateGroupAnswers(answers) {
      return answers.filter(a => !a.value);
    }

    async function _saveAnswersBatch(answers) {
      for (const { qId, itemOID, value } of answers) {
        if (value && itemOID) await saveSDMValue(qId, itemOID, value);
      }
    }

    function _getFlowBubble() {
      const allForms = document.querySelectorAll('.msg-row.bot .msg-bubble [data-form-id]');
      if (!allForms.length) return null;
      return allForms[0].closest('.msg-bubble');
    }

    async function goBackGroup() {
      if (_formFlow.currentIndex <= 0) return;
      _formFlow.currentIndex--;
      const prevGroup = _formFlow.groups[_formFlow.currentIndex];
      fetch(`${BACKEND}/api/mcqs?_t=${Date.now()}`)
        .then(r => r.json())
        .then(data => {
          const questions = data.mcqs || data.questions || [];
          window._practiceFullList = questions;
          const targetBubble = _getFlowBubble();
          if (targetBubble) targetBubble.innerHTML = buildNormalView(questions, prevGroup);
        });
    }

    async function confirmFullForm() {
      const activeBubble = _getFlowBubble();
      const formEl = activeBubble?.querySelector('[data-form-id]');
      const formId = formEl?.getAttribute('data-form-id');

      const cards = formId
        ? document.querySelectorAll(`#practice-cards-${formId} .mcq-card`)
        : document.querySelectorAll('#practice-cards .mcq-card');

      const answers = _collectGroupAnswersFromCards(cards);
      const unfilled = _validateGroupAnswers(answers);

      if (unfilled.length > 0) {
        const errEl = formId
          ? document.getElementById(`flow-error-msg-${formId}`)
          : document.getElementById('flow-error-msg');
        if (errEl) {
          errEl.style.display = 'block';
          errEl.textContent = `⚠️ Please fill in all ${unfilled.length} unanswered question${unfilled.length > 1 ? 's' : ''} before confirming.`;
        }
        return;
      }

      const groupName = _formFlow.groups[_formFlow.currentIndex];
      _formFlow.answers[groupName] = answers;

      // Step 1: Save answers
      await _saveAnswersBatch(answers);

      // Block any reloads for 3 seconds
      window._formJustSubmitted = true;
      setTimeout(() => { window._formJustSubmitted = false; }, 3000);

      // Step 3: Reset form flow
      _formFlow = { active: false, groups: [], currentIndex: 0, answers: {} };

      const savedPanel = document.getElementById('saved-panel');
      if (savedPanel.classList.contains('open')) loadSavedResponsesPanel();

      // Step 4: Rebuild form — backend is now empty so loadSDMResponses loads nothing
      const targetBubble = _getFlowBubble();
      try {
        const r = await fetch(`${BACKEND}/api/mcqs?_t=${Date.now()}`);
        const data = await r.json();
        const questions = data.mcqs || data.questions || [];
        if (!questions.length) return;
        window._practiceAllQuestions = questions;
        window._practiceFullList = questions;
        const firstGroup = [...new Set(questions.map(q => q.topic).filter(Boolean))][0] || null;
        if (targetBubble) {
          targetBubble.innerHTML = buildNormalView(questions, firstGroup);
        }
      } catch (e) { }
    }

    window._practiceFullList = [];
    window._isPracticeMode = false;
    function switchPracticeTopic(topic) {
      const allBubbles = document.querySelectorAll('.msg-row.bot .msg-bubble');
      let targetBubble = null;
      for (let i = allBubbles.length - 1; i >= 0; i--) {

          targetBubble = allBubbles[i];
          break;
        }
      }

      // Always fetch fresh questions to ensure panel is populated
      fetch(`${BACKEND}/api/mcqs?_t=${Date.now()}`)
        .then(r => r.json())
        .then(data => {
          const questions = data.mcqs || data.questions || [];
          if (!questions.length) return;
          window._practiceFullList = questions;
          window._practiceAllQuestions = questions;
          if (window._isPracticeMode) {
            targetBubble.innerHTML = buildPracticeView(questions, topic === 'All' ? null : topic);
          } else {
            targetBubble.innerHTML = buildNormalView(questions, topic === 'All' ? null : topic);
          }

        .catch(() => { });

    // ─── EDIT MODAL ───────────────────────────────────────────────────────────────

    function openEditModal(q) {
      _emCurrentQ = q;

      document.getElementById('em-topic').value = q.topic || '';

        if (tag === 'integer' || tag === 'float') type = 'number';
        else if (tag === 'boolean') type = 'boolean';
        else if (tag === 'singleselect') type = 'single';
        else if (tag === 'multiselect') type = 'multi';

      const src = q || _emCurrentQ || {};

            .filter((opt, i) => i < 2 || opt.value.trim() !== '');
        } else {
          _emOptions = opts.map(k => ({ label: k, value: src[`option_${k.toLowerCase()}`] || '' }));
        }
        area.innerHTML = _buildEditOptsHTML('multi');
        answerGroup.style.display = '';

    async function saveEditModal() {
      const id = document.getElementById('em-id').value;
      const type = document.getElementById('em-type').value;
      const labels = 'abcdefghijklmnopqrstuvwxyz';

      let option_a = '', option_b = '', option_c = '', option_d = '', answer = '';

      if (type === 'number') {
        answer = document.getElementById('em-number-answer')?.value.trim() || '';
        option_a = answer;
      } else if (type === 'char') {
        answer = document.getElementById('em-char-answer')?.value.trim() || '';
        option_a = answer;
      } else if (type === 'boolean') {
        option_a = document.getElementById('em-bool-a')?.value.trim() || 'True';
        option_b = document.getElementById('em-bool-b')?.value.trim() || 'False';
        answer = document.getElementById('em-answer').value.trim().toUpperCase();
      } else if (type === 'multi') {
        const checked = [...document.querySelectorAll('input[name="em-opt-select"]:checked')].map(el => el.value);
        answer = checked.join(',');
        _emOptions.forEach((o, i) => { if (i < 26) { if (i === 0) option_a = o.value; else if (i === 1) option_b = o.value; else if (i === 2) option_c = o.value; else if (i === 3) option_d = o.value; } });
      } else {
        const selected = document.querySelector('input[name="em-opt-select"]:checked');
        answer = selected ? selected.value : document.getElementById('em-answer')?.value.trim().toUpperCase() || 'A';
        _emOptions.forEach((o, i) => { if (i === 0) option_a = o.value; else if (i === 1) option_b = o.value; else if (i === 2) option_c = o.value; else if (i === 3) option_d = o.value; });
      }


      const changes = {
        question: document.getElementById('em-question').value.trim(),
        option_a, option_b, option_c, option_d, answer,
        difficulty: document.getElementById('em-difficulty').value.trim(),
        topic: document.getElementById('em-topic').value.trim(),
        type,
      };
      if (!id) { addMessage('bot', '', `<div style="color:var(--hard)">⚠️ No question ID found.</div>`); closeEditModal(); return; }
      try {
        const r = await fetch(`${BACKEND}/api/mcqs/${id}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ updates: changes })
        });
        const data = await r.json();
        closeEditModal();
        addMessage('bot', '', `<div><div style="color:var(--easy);font-weight:600;margin-bottom:8px">✅ Question updated!</div>${buildMcqCard(data.mcq || changes, '★')}</div>`);

        // Refresh the normal view cards in chat if visible
        const allBubbles = document.querySelectorAll('.msg-row.bot .msg-bubble');
        for (let i = allBubbles.length - 1; i >= 0; i--) {
          const cards = allBubbles[i].querySelectorAll('.mcq-card[id^="ncard-"]');
          if (cards.length > 0) {
            const updatedQ = data.mcq || { ...(_emCurrentQ || {}), ...changes };
            cards.forEach(card => {
              const raw = card.getAttribute('data-question');
              if (!raw) return;
              try {
                const cardQ = JSON.parse(raw);
                if (cardQ.id === id) {
                  const qId = (updatedQ.id || id).toString().replace(/[^a-zA-Z0-9_-]/g, '_');
                  card.querySelector('.mcq-q').textContent = updatedQ.question || cardQ.question;
                  const reveal = card.querySelector('.answer-reveal');
                  if (reveal) reveal.textContent = `✅ Answer: ${(updatedQ.answer || '').split(',').map(k => `${k.trim()} — ${updatedQ[`option_${k.trim().toLowerCase()}`] || ''}`).join(', ')}`;
                  card.setAttribute('data-question', JSON.stringify(updatedQ));
                }
              } catch { }
            });
            break;
          }
        }
      } catch {
        addMessage('bot', '', `<div style="color:var(--hard)">⚠️ Failed to update.</div>`);
        closeEditModal();
      }
    }

      document.getElementById('am-question').value = '';
      document.getElementById('am-difficulty').value = '';
      document.getElementById('am-topic').value = '';
      document.getElementById('am-type').value = 'single';
      handleAddTypeChange('single');
      document.getElementById('am-position-type').value = 'last';
      document.getElementById('am-position-num-wrap').style.display = 'none';
      if (document.getElementById('am-position-num')) document.getElementById('am-position-num').value = '';
    }

    function handlePositionTypeChange(val) {
      document.getElementById('am-position-num-wrap').style.display = val === 'after' ? 'block' : 'none';
    }

    function closeAddModal() {
      document.getElementById('add-modal').classList.remove('show');
      window._addedQCount = 0;
      const successMsg = document.getElementById('am-success-msg');
      if (successMsg) { successMsg.style.display = 'none'; successMsg.textContent = ''; }
    }

    function cancelAddModal() {
      window._addedQCount = 0;
      closeAddModal();
    }

    async function saveAddModal() {
      const type = document.getElementById('am-type').value;
      const question = document.getElementById('am-question').value.trim();
      if (!question) { alert('Please enter a question.'); return; }

      let q = {
        question,
        difficulty: document.getElementById('am-difficulty').value.trim(),
        topic: document.getElementById('am-topic').value.trim(),
        type,
        option_a: '', option_b: '', option_c: '', option_d: '',
        answer: '',
      };

      if (type === 'number') {
        const num = document.getElementById('am-number-answer')?.value.trim();
        if (!num) { alert('Please enter the correct number answer.'); return; }
        q.answer = num;
        q.option_a = num;
      } else if (type === 'boolean') {
        const inputs = document.querySelectorAll('.em-bool-opt');
        q.option_a = inputs[0]?.value.trim() || 'True';
        q.option_b = inputs[1]?.value.trim() || 'False';
        q.answer = document.getElementById('am-answer').value.trim();
      } else {
        // Read current values from DOM inputs directly (more reliable than _amOptions cache)
        const optInputs = document.querySelectorAll('#am-opts-list input[type="text"]');
        optInputs.forEach((inp, i) => { if (_amOptions[i]) _amOptions[i].value = inp.value.trim(); });
        const filled = _amOptions.filter(o => o.value.trim());
        if (filled.length < 2) { alert('Please fill at least 2 options.'); return; }
        const labels = 'abcdefghijklmnopqrstuvwxyz';
        _amOptions.forEach((o, i) => {
          if (i < 26) q[`option_${labels[i]}`] = o.value.trim();
        });
        const type2 = document.getElementById('am-type').value;
        if (type2 === 'multi') {
          const checked = [...document.querySelectorAll('input[name="am-opt-select"]:checked')].map(el => el.value);
          q.answer = checked.join(',') || 'A';
        } else if (type2 === 'single') {
          const selected = document.querySelector('input[name="am-opt-select"]:checked');
          q.answer = selected ? selected.value : document.getElementById('am-answer').value.trim().toUpperCase() || 'A';
        } else {
          q.answer = document.getElementById('am-answer').value.trim().toUpperCase();
        }
      }

      // Resolve position
      const posType = document.getElementById('am-position-type').value;
      let position = null;
      if (posType === 'first') position = 1;
      else if (posType === 'after') {
        const n = parseInt(document.getElementById('am-position-num')?.value);
        if (n && n > 0) position = n + 1;
      }
      if (position !== null) q.position = position;
      q.insert_after_topic = true; // tells backend to insert within topic group

      try {
        const r = await fetch(`${BACKEND}/api/mcqs/add`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(q)
        });
        if (!r.ok) throw new Error();
        const data = await r.json();

        // Increment counter
        window._addedQCount = (window._addedQCount || 0) + 1;

        // Show success inside modal
        const successMsg = document.getElementById('am-success-msg');
        if (successMsg) {
          successMsg.textContent = `✅ ${window._addedQCount} question${window._addedQCount > 1 ? 's' : ''} added! Fill in the next one or click Done.`;
          successMsg.style.display = 'block';
        }

        // Reset form for next question
        document.getElementById('am-question').value = '';
        document.getElementById('am-difficulty').value = 'Medium';
        document.getElementById('am-topic').value = q.topic || ''; // keep same topic
        document.getElementById('am-type').value = 'single';
        document.getElementById('am-position-type').value = 'last';
        document.getElementById('am-position-num-wrap').style.display = 'none';
        if (document.getElementById('am-position-num')) document.getElementById('am-position-num').value = '';
        handleAddTypeChange('single');

        // Add to chat in background
        addMessage('bot', '', `<div><div style="color:var(--easy);font-weight:600;margin-bottom:8px">✅ Question added!</div>${buildMcqCard(data.mcq || q, '★')}</div>`);
      } catch {
        addMessage('bot', '', `<div style="color:var(--hard)">⚠️ Failed to add question.</div>`);
        closeAddModal();
      }
    }

    function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
    function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 140) + 'px'; }
    function showExportModal() { document.getElementById('export-modal').classList.add('show'); }
    function hideExportModal() { document.getElementById('export-modal').classList.remove('show'); }

    async function doExport(fmt, topic) {
      hideExportModal();
      try {
        let url = `${BACKEND}/api/export?fmt=${fmt}`;
        if (topic && topic !== 'null') url += `&topic=${encodeURIComponent(topic)}`;
        const r = await fetch(url); if (!r.ok) throw new Error();
        const blob = await r.blob(); const blobUrl = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = blobUrl; a.download = `${topic ? topic.toLowerCase() + '_' : ''}mcq_questions.${fmt}`; a.click(); URL.revokeObjectURL(blobUrl);
        addMessage('bot', '', `<div style="color:var(--easy)">✅ Exported as <strong>.${fmt}</strong>!</div>`);
      } catch { addMessage('bot', '', `<div style="color:var(--hard)">⚠️ Export failed.</div>`); }
    }

    function exportChat() {
      const session = getActiveSession(); if (!session || !session.messages.length) { alert('No chat to export.'); return; }
      const lines = session.messages.map(m => `[${m.role.toUpperCase()}]: ${m.content || '(formatted)'}`).join('\n\n');
      const blob = new Blob([`MCQ Manager Chat Export\n${'='.repeat(40)}\n\n${lines}`], { type: 'text/plain' });
      const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = 'mcq_chat.txt'; a.click(); URL.revokeObjectURL(url);
    }

    // ─── CONDITIONAL QUESTION LOGIC ──────────────────────────────────────────────
    // Call this after any option is selected.
    // It looks at all visible questions and shows/hides based on conditions.

    function evaluateConditions(changedItemOid, selectedValue) {
      // Store the current answer for this item
      if (!window._formAnswers) window._formAnswers = {};
      window._formAnswers[changedItemOid] = selectedValue;

      // Now check all cards in the current view
      const cards = document.querySelectorAll('#practice-cards .mcq-card');
      cards.forEach(card => {
        const raw = card.getAttribute('data-question');
        if (!raw) return;
        try {
          const q = JSON.parse(raw);
          const cond = q.condition;
          if (!cond) return; // no condition = always visible

          const parentAnswer = window._formAnswers[cond.parent_item_oid] || null;
          const matches = parentAnswer === cond.parent_value;

          // hide_when_match: true means hide when parent == value (!(I.x == "y") pattern)
          const shouldHide = cond.hide_when_match ? matches : !matches;

          if (shouldHide) {
            card.style.display = 'none';
            card.dataset.conditionHidden = '1';
          } else {
            card.style.display = '';
            card.dataset.conditionHidden = '';
          }
        } catch { }
      });
    }

    // Also run on page load to hide questions whose parent has a default/saved answer
    function evaluateAllConditions() {
      if (!window._formAnswers) return;
      const cards = document.querySelectorAll('#practice-cards .mcq-card');
      cards.forEach(card => {
        const raw = card.getAttribute('data-question');
        if (!raw) return;
        try {
          const q = JSON.parse(raw);
          const cond = q.condition;
          if (!cond) return;

          const parentAnswer = window._formAnswers[cond.parent_item_oid] || null;
          if (!parentAnswer) {
            // No answer yet for parent — hide by default if condition exists
            card.style.display = 'none';
            card.dataset.conditionHidden = '1';
            return;
          }

          const matches = parentAnswer === cond.parent_value;
          const shouldHide = cond.hide_when_match ? matches : !matches;

          if (shouldHide) {
            card.style.display = 'none';
            card.dataset.conditionHidden = '1';
          } else {
            card.style.display = '';
            card.dataset.conditionHidden = '';
          }
        } catch { }
      });
    }

    async function handleDeleteOption(intent) {
      try {
        const r = await fetch(`${BACKEND}/api/mcqs?_t=${Date.now()}`);
        const data = await r.json();
        const questions = data.mcqs || data.questions || [];

        const groupHint = intent.group?.name || null;
        let pool = questions;
        if (groupHint) {
          // Check if it's a group number like "Group 3"
          const groupNumMatch = groupHint.match(/(\d+)/);
          if (groupNumMatch) {
            const groupNum = parseInt(groupNumMatch[1]);
            const topics = [...new Set(questions.map(q => q.topic).filter(Boolean))];
            const targetTopic = topics[groupNum - 1];
            if (targetTopic) pool = questions.filter(q => q.topic === targetTopic);
          } else {
            const filtered = questions.filter(q => (q.topic || '').toLowerCase().includes(groupHint.toLowerCase()));
            if (filtered.length > 0) pool = filtered;
          }
        }

        const qNum = intent.questionNum;
        const q = pool[qNum - 1];
        if (!q) return `<div style="color:var(--hard)">⚠️ Question ${qNum} not found.</div>`;

        const optKey = (intent.optionKey || '').toUpperCase();
        const optField = `option_${optKey.toLowerCase()}`;
        const optValue = q[optField];
        if (!optValue) return `<div style="color:var(--hard)">⚠️ Option ${optKey} not found in Q${qNum}.</div>`;

        pendingDelete = { questionId: q.id, qNum, optKey, optField, optValue, step: 'awaiting_confirm_option' };
        return `<div>
      <div style="font-weight:600;margin-bottom:8px;font-size:13px">❌ Delete Option ${optKey}?</div>
      <div style="padding:8px 12px;background:var(--surface2);border-radius:8px;border:1px solid var(--border);font-size:12px;margin-bottom:10px">
        <b>${optKey}:</b> ${optValue}
      </div>
      <div style="display:flex;gap:8px">
        <button class="export-btn-inline xlsx" onclick="confirmAction()">✅ Yes, Delete</button>
        <button class="export-btn-inline pdf" onclick="cancelAction()">❌ No, Cancel</button>
      </div>
    </div>`;
      } catch {
        return `<div style="color:var(--hard)">⚠️ Could not fetch questions.</div>`;
      }
    }
  </script>
